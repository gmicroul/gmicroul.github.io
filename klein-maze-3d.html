<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>克莱因瓶迷宫 3D 单文件版</title>
  <style>
    :root{color-scheme:dark;--text:#edf0f2;--muted:#a7b1bb;--panel:rgba(17,20,25,.8);--line:rgba(255,255,255,.14);--teal:#4ecdc4;--yellow:#ffca3a;--green:#8ac926;--red:#ff6b6b}
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#101318;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #view{position:fixed;inset:0;width:100%;height:100%;display:block;background:#101318;touch-action:none}
    .hud{position:fixed;left:14px;top:14px;width:min(346px,calc(100vw - 28px));padding:14px;border:1px solid var(--line);border-radius:8px;background:var(--panel);backdrop-filter:blur(14px);box-shadow:0 18px 60px rgba(0,0,0,.35)}
    h1{margin:0;font-size:20px;line-height:1.15;letter-spacing:0}.sub{margin:6px 0 12px;color:var(--muted);font-size:13px;line-height:1.45}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}.stat{min-height:54px;padding:8px;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.06)}.stat span{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.stat strong{display:block;font-size:18px;line-height:1.1;letter-spacing:0}
    .buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:10px 0}button{min-height:38px;padding:0 10px;border:0;border-radius:8px;background:#303946;color:var(--text);font:inherit;cursor:pointer}button:hover{background:#3b4653}button.primary{background:#247a75}button.primary:hover{background:#2d8f88}
    .log{min-height:44px;padding:9px;border-radius:8px;background:rgba(0,0,0,.24);color:var(--muted);font-size:13px;line-height:1.42}
    .mapBox{position:fixed;right:14px;top:14px;padding:8px;border:1px solid var(--line);border-radius:8px;background:var(--panel);backdrop-filter:blur(14px);box-shadow:0 18px 60px rgba(0,0,0,.28)}#map{display:block;width:230px;height:154px}
    .reticle{position:fixed;left:50%;top:50%;width:22px;height:22px;transform:translate(-50%,-50%);pointer-events:none}.reticle:before,.reticle:after{content:"";position:absolute;background:rgba(237,240,242,.72);border-radius:999px}.reticle:before{left:10px;top:3px;width:2px;height:16px}.reticle:after{left:3px;top:10px;width:16px;height:2px}
    .help{position:fixed;left:14px;right:14px;bottom:14px;display:flex;justify-content:center;pointer-events:none}.help span{max-width:min(760px,100%);padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:rgba(17,20,25,.74);color:var(--muted);font-size:13px;line-height:1.45;text-align:center;backdrop-filter:blur(12px)}
    kbd{display:inline-block;min-width:22px;padding:1px 6px;border-radius:5px;background:#101419;border:1px solid rgba(255,255,255,.18);color:var(--text);font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;text-align:center}
    .stick{display:none;position:fixed;left:14px;bottom:14px;width:132px;height:132px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(17,20,25,.42);backdrop-filter:blur(10px);touch-action:none;pointer-events:auto}.stick:before{content:"";position:absolute;inset:28px;border-radius:50%;border:1px solid rgba(255,255,255,.1)}.knob{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;background:rgba(78,205,196,.82);box-shadow:0 8px 24px rgba(0,0,0,.35),inset 0 0 0 2px rgba(255,255,255,.24)}
    @media(max-width:760px){.mapBox{display:none}.hud{left:8px;right:8px;top:8px;width:auto;padding:8px;max-height:none;overflow:visible}.hud h1{font-size:14px}.sub,.log,.help{display:none}.stats{grid-template-columns:repeat(4,1fr);gap:4px;margin:6px 0}.stat{min-height:34px;padding:5px}.stat span{font-size:9px;margin-bottom:1px}.stat strong{font-size:13px}.buttons{grid-template-columns:repeat(6,1fr);gap:4px;margin:6px 0 0}button{min-height:30px;padding:0 4px;font-size:12px}.stick{display:block}}
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <div class="hud">
    <h1>克莱因瓶迷宫 3D</h1>
    <p class="sub">单文件 HTML5 版。左右边界同向相接；上下边界镜像相接并翻转朝向。</p>
    <div class="stats">
      <div class="stat"><span>步数</span><strong id="steps">0</strong></div>
      <div class="stat"><span>标记</span><strong id="tokens">0/3</strong></div>
      <div class="stat"><span>手性</span><strong id="handed">正</strong></div>
      <div class="stat"><span>最佳</span><strong id="best">--</strong></div>
    </div>
    <div class="buttons">
      <button class="primary" id="lock">进入视角</button><button id="hint">提示</button><button id="reset">重开</button>
      <button id="newMaze">新迷宫</button><button id="seams">边界: 开</button><button id="mapToggle">地图: 开</button>
    </div>
    <div class="log" id="log">点击“进入视角”，用鼠标看，用 WASD 或方向键走。</div>
  </div>
  <div class="mapBox" id="mapBox"><canvas id="map" width="230" height="154"></canvas></div>
  <div class="reticle"></div>
  <div class="help"><span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动，鼠标转向，<kbd>Esc</kbd> 释放鼠标，<kbd>H</kbd> 提示，<kbd>R</kbd> 重开。</span></div>
  <div class="stick" id="stick" aria-label="移动摇杆"><div class="knob" id="knob"></div></div>
<script>
(() => {
  const W=18,H=12,FOV=Math.PI/3,CELL=1;
  const DIRS=[{dx:0,dy:-1,opposite:2,label:'上'},{dx:1,dy:0,opposite:3,label:'右'},{dx:0,dy:1,opposite:0,label:'下'},{dx:-1,dy:0,opposite:1,label:'左'}];
  const canvas=document.getElementById('view'),ctx=canvas.getContext('2d');
  const map=document.getElementById('map'),mctx=map.getContext('2d');
  const stepsEl=document.getElementById('steps'),tokensEl=document.getElementById('tokens'),handedEl=document.getElementById('handed'),bestEl=document.getElementById('best'),logEl=document.getElementById('log'),mapBox=document.getElementById('mapBox');
  let seed=48139,maze=[],start={x:1,y:1},goal={x:16,y:10},tokens=[],collected=new Set(),player={x:1.5,y:1.5},yaw=Math.PI*.18,pitch=0,parity=0,steps=0,lastCell='1,1',won=false,showHint=false,showSeams=true,showMap=true,best=Number(localStorage.getItem('kleinMazeStandaloneBest')||0);
  const keys=new Set();
  let joyX=0,joyY=0,joyPointer=null;
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)); const wrap=(v,max)=>((v%max)+max)%max; const id=(x,y)=>y*W+x; const xy=i=>({x:i%W,y:Math.floor(i/W)});
  function rngFactory(value){let a=value>>>0;return()=>{a+=0x6d2b79f5;let t=a;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;};}
  function neighbor(x,y,dir){const d=DIRS[dir];let nx=x+d.dx,ny=y+d.dy,mirror=false,sideWrap=false;if(nx<0){nx=W-1;sideWrap=true}else if(nx>=W){nx=0;sideWrap=true}if(ny<0){ny=H-1;nx=W-1-nx;mirror=true}else if(ny>=H){ny=0;nx=W-1-nx;mirror=true}return{x:nx,y:ny,dir,mirror,sideWrap};}
  function makeMaze(value){const rnd=rngFactory(value),cells=Array.from({length:W*H},()=>[true,true,true,true]),vis=Array(W*H).fill(false),stack=[id(1,1)];vis[id(1,1)]=true;while(stack.length){const cur=stack[stack.length-1],p=xy(cur);const opts=[0,1,2,3].map(dir=>({dir,sort:rnd()})).sort((a,b)=>a.sort-b.sort).map(e=>e.dir).filter(dir=>{const n=neighbor(p.x,p.y,dir);return !vis[id(n.x,n.y)]});if(!opts.length){stack.pop();continue}const dir=opts[0],n=neighbor(p.x,p.y,dir),ni=id(n.x,n.y);cells[cur][dir]=false;cells[ni][DIRS[dir].opposite]=false;vis[ni]=true;stack.push(ni)}return cells;}
  function bfs(from,targetSet){const si=id(from.x,from.y),q=[si],seen=Array(W*H).fill(false),prev=Array(W*H).fill(-1),prevDir=Array(W*H).fill(-1),dist=Array(W*H).fill(-1);seen[si]=true;dist[si]=0;while(q.length){const cur=q.shift();if(targetSet&&targetSet.has(cur))return{found:cur,prev,prevDir,dist};const p=xy(cur);for(let dir=0;dir<4;dir++){if(maze[cur][dir])continue;const n=neighbor(p.x,p.y,dir),ni=id(n.x,n.y);if(seen[ni])continue;seen[ni]=true;prev[ni]=cur;prevDir[ni]=dir;dist[ni]=dist[cur]+1;q.push(ni)}}return{found:-1,prev,prevDir,dist};}
  function pathTo(target,prev){const path=[];let c=target;while(c!==-1){path.push(c);c=prev[c]}return path.reverse();}
  function chooseLayout(value){for(let attempt=0;attempt<120;attempt++){const cand=makeMaze(value+attempt*997);maze=cand;const s={x:1,y:1},scan=bfs(s,null);let far=0,fd=-1;for(let i=0;i<W*H;i++)if(scan.dist[i]>fd){fd=scan.dist[i];far=i}const path=pathTo(far,scan.prev);let mirrors=0,sides=0;for(let i=1;i<path.length;i++){const a=xy(path[i-1]),dir=scan.prevDir[path[i]],n=neighbor(a.x,a.y,dir);if(n.mirror)mirrors++;if(n.sideWrap)sides++}if(mirrors>=2&&sides>=1)return{maze:cand,start:s,goal:xy(far),path};}const cand=makeMaze(value);maze=cand;const s={x:1,y:1},scan=bfs(s,null);let far=0;for(let i=0;i<W*H;i++)if(scan.dist[i]>scan.dist[far])far=i;return{maze:cand,start:s,goal:xy(far),path:pathTo(far,scan.prev)};}
  function reset(newSeed=false){if(newSeed)seed=Math.floor(Math.random()*1e6);const layout=chooseLayout(seed);maze=layout.maze;start=layout.start;goal=layout.goal;player={x:start.x+.5,y:start.y+.5};yaw=Math.PI*.18;pitch=0;parity=0;steps=0;lastCell=`${start.x},${start.y}`;won=false;showHint=false;collected=new Set();tokens=[.28,.54,.78].map((f,i)=>{const pi=Math.max(1,Math.min(layout.path.length-2,Math.floor(layout.path.length*f)));return{...xy(layout.path[pi]),key:String(i)}});setLog('点击“进入视角”，用鼠标看，用 WASD 或方向键走。');updateUi();}
  function wallAt(x,y,dir){return maze[id(x,y)][dir];}
  function canCross(cx,cy,nx,ny){let dir=-1;if(nx<cx)dir=3;else if(nx>cx)dir=1;else if(ny<cy)dir=0;else if(ny>cy)dir=2;return dir<0||!wallAt(cx,cy,dir);}
  function normalizeAngle(a){while(a<=-Math.PI)a+=Math.PI*2;while(a>Math.PI)a-=Math.PI*2;return a;}
  function tryMove(tx,ty){const cx=Math.floor(player.x),cy=Math.floor(player.y);let dir=-1;if(tx<0||tx>=W||Math.floor(tx)!==cx){dir=tx<player.x?3:1}else if(ty<0||ty>=H||Math.floor(ty)!==cy){dir=ty<player.y?0:2}if(dir!==-1&&wallAt(cx,cy,dir))return false;let crossed='';if(tx<0){tx+=W;crossed='左右同向相接：你从左边界回到右侧。'}else if(tx>=W){tx-=W;crossed='左右同向相接：你从右边界回到左侧。'}if(ty<0){ty+=H;tx=wrap(W-tx,W);yaw=normalizeAngle(Math.PI-yaw);parity=1-parity;crossed='上下镜像相接：位置和朝向翻转。'}else if(ty>=H){ty-=H;tx=wrap(W-tx,W);yaw=normalizeAngle(Math.PI-yaw);parity=1-parity;crossed='上下镜像相接：位置和朝向翻转。'}player.x=wrap(tx,W);player.y=wrap(ty,H);if(crossed)setLog(crossed);return true;}
  function update(dt){if(won)return;const keyFwd=(keys.has('KeyW')||keys.has('ArrowUp')?1:0)-(keys.has('KeyS')||keys.has('ArrowDown')?1:0),keySide=(keys.has('KeyD')||keys.has('ArrowRight')?1:0)-(keys.has('KeyA')||keys.has('ArrowLeft')?1:0);const fwd=keyFwd-joyY,side=keySide+joyX;if(fwd||side){const len=Math.max(1,Math.hypot(fwd,side)),speed=2.8,step=speed*dt,fx=Math.cos(yaw),fy=Math.sin(yaw),rx=Math.cos(yaw+Math.PI/2),ry=Math.sin(yaw+Math.PI/2);tryMove(player.x+((fx*fwd+rx*side)/len)*step,player.y);tryMove(player.x,player.y+((fy*fwd+ry*side)/len)*step);afterMove();}}
  function afterMove(){const cx=Math.floor(player.x),cy=Math.floor(player.y),ck=`${cx},${cy}`;if(ck!==lastCell){steps++;lastCell=ck}for(const t of tokens){if(!collected.has(t.key)&&t.x===cx&&t.y===cy){collected.add(t.key);setLog(collected.size===tokens.length?'三个标记已收集，出口开启。':'收集到一个拓扑标记。')}}if(cx===goal.x&&cy===goal.y){if(collected.size===tokens.length)finish();else setLog('出口还没开启，先收集所有黄色标记。')}updateUi();}
  function finish(){if(won)return;won=true;if(!best||steps<best){best=steps;localStorage.setItem('kleinMazeStandaloneBest',String(best))}setLog(`完成。你用了 ${steps} 步走出单文件克莱因瓶迷宫。`);document.exitPointerLock?.();updateUi();}
  function castRay(angle){let x=player.x,y=player.y,dx=Math.cos(angle),dy=Math.sin(angle),dist=0,side=0,hit=false,hitDir=0,max=36;while(dist<max&&!hit){const cx=Math.floor(x),cy=Math.floor(y);let tx=Infinity,ty=Infinity;if(dx>0)tx=(Math.floor(x)+1-x)/dx;else if(dx<0)tx=(Math.floor(x)-x)/dx;if(dy>0)ty=(Math.floor(y)+1-y)/dy;else if(dy<0)ty=(Math.floor(y)-y)/dy;const step=Math.max(.0001,Math.min(tx,ty));let nx=x+dx*(step+.0002),ny=y+dy*(step+.0002);dist+=step;let dir=-1;if(tx<ty){dir=dx>0?1:3;side=1}else{dir=dy>0?2:0;side=0}if(wallAt(cx,cy,dir)){hit=true;hitDir=dir;break}if(nx<0){nx+=W}else if(nx>=W){nx-=W}if(ny<0){ny+=H;nx=wrap(W-nx,W)}else if(ny>=H){ny-=H;nx=wrap(W-nx,W)}x=wrap(nx,W);y=wrap(ny,H)}return{dist,side,hitDir};}
  function rayClearTo(tx,ty){const sx=player.x,sy=player.y,dx=tx-sx,dy=ty-sy;if(Math.hypot(dx,dy)<.05)return true;let mx=Math.floor(wrap(sx,W)),my=Math.floor(wrap(sy,H)),lx=Math.floor(sx),ly=Math.floor(sy);const stepX=dx>0?1:dx<0?-1:0,stepY=dy>0?1:dy<0?-1:0;let tMaxX=stepX?(((stepX>0?lx+1:lx)-sx)/dx):Infinity,tMaxY=stepY?(((stepY>0?ly+1:ly)-sy)/dy):Infinity;const tDeltaX=stepX?Math.abs(1/dx):Infinity,tDeltaY=stepY?Math.abs(1/dy):Infinity;for(let guard=0;guard<80&&(tMaxX<=1||tMaxY<=1);guard++){if(tMaxX<tMaxY-.000001){const dir=stepX>0?1:3;if(wallAt(mx,my,dir))return false;lx+=stepX;mx=wrap(mx+stepX,W);tMaxX+=tDeltaX}else if(tMaxY<tMaxX-.000001){const dir=stepY>0?2:0;if(wallAt(mx,my,dir))return false;ly+=stepY;my=wrap(my+stepY,H);if(ly<0||ly>=H){mx=W-1-mx;ly=wrap(ly,H)}tMaxY+=tDeltaY}else{const dirX=stepX>0?1:3,dirY=stepY>0?2:0;if((stepX&&wallAt(mx,my,dirX))||(stepY&&wallAt(mx,my,dirY)))return false;lx+=stepX;ly+=stepY;mx=wrap(mx+stepX,W);my=wrap(my+stepY,H);if(ly<0||ly>=H){mx=W-1-mx;ly=wrap(ly,H)}tMaxX+=tDeltaX;tMaxY+=tDeltaY}}return true;}
  function render(){const w=canvas.clientWidth,h=canvas.clientHeight;ctx.clearRect(0,0,w,h);const sky=ctx.createLinearGradient(0,0,0,h*.52);sky.addColorStop(0,'#1b242e');sky.addColorStop(1,'#0f1319');ctx.fillStyle=sky;ctx.fillRect(0,0,w,h*.52);const floor=ctx.createLinearGradient(0,h*.5,0,h);floor.addColorStop(0,'#1b2027');floor.addColorStop(1,'#0b0d10');ctx.fillStyle=floor;ctx.fillRect(0,h*.5,w,h*.5);for(let y=h*.55;y<h;y+=22){ctx.strokeStyle=`rgba(78,205,196,${.08+(y/h)*.08})`;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}const rays=Math.min(w,900),colW=w/rays,zbuf=[];for(let i=0;i<rays;i++){const cameraX=(i/rays-.5),ang=yaw+cameraX*FOV,ray=castRay(ang),corrected=Math.max(.001,ray.dist*Math.cos(ang-yaw));zbuf[i]=corrected;const lineH=Math.min(h*1.8,h/corrected*.9),top=h/2-lineH/2+pitch*h*.6,shade=clamp(1/(corrected*.16+.35),.16,1),base=ray.side?'174,184,194':'210,220,230';ctx.fillStyle=`rgba(${base},${shade})`;ctx.fillRect(i*colW,top,Math.ceil(colW)+1,lineH);if(showSeams&&(ray.hitDir===0||ray.hitDir===2)){ctx.fillStyle='rgba(255,107,107,.34)';ctx.fillRect(i*colW,top,Math.ceil(colW)+1,lineH)}else if(showSeams&&(ray.hitDir===1||ray.hitDir===3)){ctx.fillStyle='rgba(78,205,196,.2)';ctx.fillRect(i*colW,top,Math.ceil(colW)+1,lineH)}}drawSprites(zbuf,w,h,rays,colW);drawHint3d(w,h,zbuf,rays);if(won){ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(0,0,w,h);ctx.fillStyle='#edf0f2';ctx.textAlign='center';ctx.font='700 42px system-ui,sans-serif';ctx.fillText('完成',w/2,h/2-18);ctx.font='18px system-ui,sans-serif';ctx.fillText(`步数：${steps}，按 R 重开`,w/2,h/2+22)}}
  function drawSprites(zbuf,w,h,rays,colW){const list=[];for(const t of tokens)if(!collected.has(t.key))list.push({x:t.x+.5,y:t.y+.5,type:'token'});list.push({x:goal.x+.5,y:goal.y+.5,type:'goal'});list.sort((a,b)=>dist2(b)-dist2(a));for(const s of list){let dx=s.x-player.x,dy=s.y-player.y;if(dx>W/2)dx-=W;if(dx<-W/2)dx+=W;if(dy>H/2)dy-=H;if(dy<-H/2)dy+=H;const dist=Math.hypot(dx,dy);if(dist<.08||dist>16||!rayClearTo(player.x+dx,player.y+dy))continue;let angle=Math.atan2(dy,dx)-yaw;while(angle<-Math.PI)angle+=Math.PI*2;while(angle>Math.PI)angle-=Math.PI*2;if(Math.abs(angle)>FOV*.62)continue;const sx=w/2+(angle/(FOV/2))*w/2,size=clamp(h/dist*.28,16,120),col=Math.floor(sx/colW);if(col>=0&&col<zbuf.length&&dist>zbuf[col]+.25)continue;ctx.save();ctx.translate(sx,h/2+pitch*h*.6);if(s.type==='token'){ctx.fillStyle='#ffca3a';ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=3;ctx.rotate(performance.now()/900);ctx.fillRect(-size/2,-size/2,size,size);ctx.strokeRect(-size/2,-size/2,size,size)}else{const open=collected.size===tokens.length;ctx.fillStyle=open?'#8ac926':'rgba(138,201,38,.35)';ctx.strokeStyle=open?'#d9ff9b':'rgba(217,255,155,.45)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,size*.55,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=open?'#10210d':'rgba(16,33,13,.55)';ctx.font=`700 ${Math.max(14,size*.45)}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('出',0,1)}ctx.restore();}}
  function dist2(s){let dx=s.x-player.x,dy=s.y-player.y;if(dx>W/2)dx-=W;if(dx<-W/2)dx+=W;if(dy>H/2)dy-=H;if(dy<-H/2)dy+=H;return dx*dx+dy*dy;}
  function currentTargets(){const rem=tokens.filter(t=>!collected.has(t.key)).map(t=>id(t.x,t.y));return new Set(rem.length?rem:[id(goal.x,goal.y)]);}
  function drawHint3d(w,h,zbuf,rays){if(!showHint)return;const route=bfs({x:Math.floor(player.x),y:Math.floor(player.y)},currentTargets());if(route.found===-1)return;const path=pathTo(route.found,route.prev).slice(1,6);ctx.strokeStyle='rgba(255,202,58,.8)';ctx.lineWidth=5;ctx.beginPath();let started=false;for(const idx of path){const p=xy(idx);let dx=p.x+.5-player.x,dy=p.y+.5-player.y;if(dx>W/2)dx-=W;if(dx<-W/2)dx+=W;if(dy>H/2)dy-=H;if(dy<-H/2)dy+=H;let a=Math.atan2(dy,dx)-yaw;while(a<-Math.PI)a+=Math.PI*2;while(a>Math.PI)a-=Math.PI*2;if(Math.abs(a)>FOV*.6)continue;const d=Math.hypot(dx,dy),sx=canvas.clientWidth/2+(a/(FOV/2))*canvas.clientWidth/2,sy=canvas.clientHeight/2+canvas.clientHeight/(d+1)*.18+pitch*canvas.clientHeight*.6;if(!started){ctx.moveTo(sx,sy);started=true}else ctx.lineTo(sx,sy)}ctx.stroke();}
  function drawMap(){if(!showMap)return;const w=map.width,h=map.height,pad=9,cw=(w-pad*2)/W,ch=(h-pad*2)/H;mctx.clearRect(0,0,w,h);mctx.fillStyle='rgba(10,13,17,.92)';mctx.fillRect(0,0,w,h);if(showHint){const route=bfs({x:Math.floor(player.x),y:Math.floor(player.y)},currentTargets());if(route.found!==-1){const path=pathTo(route.found,route.prev);mctx.strokeStyle='rgba(255,202,58,.7)';mctx.lineWidth=3;mctx.beginPath();path.forEach((idx,i)=>{const p=xy(idx),x=pad+(p.x+.5)*cw,y=pad+(p.y+.5)*ch;if(i===0)mctx.moveTo(x,y);else{const prev=xy(path[i-1]);if(Math.abs(prev.x-p.x)>1||Math.abs(prev.y-p.y)>1)mctx.moveTo(x,y);else mctx.lineTo(x,y)}});mctx.stroke()}}mctx.strokeStyle='rgba(237,240,242,.82)';mctx.lineWidth=1.5;for(let y=0;y<H;y++)for(let x=0;x<W;x++){const walls=maze[id(x,y)],px=pad+x*cw,py=pad+y*ch;if(walls[0])ml(px,py,px+cw,py);if(walls[1])ml(px+cw,py,px+cw,py+ch);if(walls[2])ml(px,py+ch,px+cw,py+ch);if(walls[3])ml(px,py,px,py+ch)}mctx.strokeStyle='rgba(78,205,196,.9)';mctx.strokeRect(pad,pad,W*cw,H*ch);mctx.strokeStyle='rgba(255,107,107,.95)';ml(pad,pad,pad+W*cw,pad);ml(pad,pad+H*ch,pad+W*cw,pad+H*ch);for(const t of tokens)if(!collected.has(t.key)){mctx.fillStyle='#ffca3a';mctx.fillRect(pad+(t.x+.32)*cw,pad+(t.y+.32)*ch,cw*.36,ch*.36)}mctx.fillStyle=collected.size===tokens.length?'#8ac926':'rgba(138,201,38,.45)';mctx.beginPath();mctx.arc(pad+(goal.x+.5)*cw,pad+(goal.y+.5)*ch,Math.max(4,cw*.28),0,Math.PI*2);mctx.fill();const px=pad+player.x*cw,py=pad+player.y*ch;mctx.fillStyle=parity?'#ff6b6b':'#4ecdc4';mctx.beginPath();mctx.arc(px,py,5,0,Math.PI*2);mctx.fill();mctx.strokeStyle='#edf0f2';mctx.beginPath();mctx.moveTo(px,py);mctx.lineTo(px+Math.cos(yaw)*13,py+Math.sin(yaw)*13);mctx.stroke();}
  function ml(x1,y1,x2,y2){mctx.beginPath();mctx.moveTo(x1,y1);mctx.lineTo(x2,y2);mctx.stroke();}
  function resize(){const dpr=Math.min(devicePixelRatio||1,2);canvas.width=Math.floor(innerWidth*dpr);canvas.height=Math.floor(innerHeight*dpr);canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}function updateUi(){stepsEl.textContent=String(steps);tokensEl.textContent=`${collected.size}/${tokens.length}`;handedEl.textContent=parity?'反':'正';bestEl.textContent=best?String(best):'--';document.getElementById('seams').textContent=`边界: ${showSeams?'开':'关'}`;document.getElementById('mapToggle').textContent=`地图: ${showMap?'开':'关'}`;mapBox.style.display=showMap?'':'none';}function setLog(t){logEl.textContent=t;}
  let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;update(dt);render();drawMap();requestAnimationFrame(loop)}
  canvas.addEventListener('click',()=>canvas.requestPointerLock?.());document.getElementById('lock').addEventListener('click',()=>canvas.requestPointerLock?.());document.addEventListener('pointerlockchange',()=>document.getElementById('lock').textContent=document.pointerLockElement===canvas?'视角已锁定':'进入视角');document.addEventListener('mousemove',e=>{if(document.pointerLockElement!==canvas)return;yaw+=e.movementX*.0024;pitch=clamp(pitch-e.movementY*.0018,-.45,.45)});
  let touch=null;canvas.addEventListener('pointerdown',e=>{if(e.pointerType!=='touch')return;touch={x:e.clientX,y:e.clientY,id:e.pointerId};canvas.setPointerCapture(e.pointerId)});canvas.addEventListener('pointermove',e=>{if(!touch||touch.id!==e.pointerId)return;yaw+=(e.clientX-touch.x)*.006;pitch=clamp(pitch-(e.clientY-touch.y)*.004,-.42,.42);touch.x=e.clientX;touch.y=e.clientY});canvas.addEventListener('pointerup',()=>touch=null);
  document.addEventListener('keydown',e=>{if(['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)){keys.add(e.code);e.preventDefault()}if(e.code==='KeyR')reset(false);if(e.code==='KeyH'){showHint=!showHint;setLog(showHint?'提示已开启。':'提示已关闭。')}});document.addEventListener('keyup',e=>keys.delete(e.code));
  document.getElementById('hint').onclick=()=>{showHint=!showHint;setLog(showHint?'提示已开启。':'提示已关闭。')};document.getElementById('reset').onclick=()=>reset(false);document.getElementById('newMaze').onclick=()=>reset(true);document.getElementById('seams').onclick=()=>{showSeams=!showSeams;updateUi()};document.getElementById('mapToggle').onclick=()=>{showMap=!showMap;updateUi()};const stick=document.getElementById('stick'),knob=document.getElementById('knob');function setJoy(e){const r=stick.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,max=r.width*.34,dx=e.clientX-cx,dy=e.clientY-cy,len=Math.hypot(dx,dy),scale=len>max?max/len:1;joyX=(dx*scale)/max;joyY=(dy*scale)/max;knob.style.transform=`translate(${joyX*max}px,${joyY*max}px)`;}function resetJoy(){joyX=0;joyY=0;joyPointer=null;knob.style.transform='translate(0,0)';}stick.addEventListener('pointerdown',e=>{e.preventDefault();joyPointer=e.pointerId;stick.setPointerCapture(e.pointerId);setJoy(e)});stick.addEventListener('pointermove',e=>{if(e.pointerId!==joyPointer)return;e.preventDefault();setJoy(e)});['pointerup','pointercancel','lostpointercapture'].forEach(ev=>stick.addEventListener(ev,resetJoy));
  addEventListener('resize',resize);resize();reset(false);requestAnimationFrame(loop);
})();
