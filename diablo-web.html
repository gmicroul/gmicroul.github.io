
  <!DOCTYPE html>
  <html lang="zh-CN">
  <head>
  <meta charset="UTF-8">
  <title>Diablo Web - HTML5 暗黑破坏神复刻</title>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh;
  font-family: 'Georgia', serif; }
  canvas { display: block; cursor: crosshair; image-rendering: pixelated; }
  #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #inventory-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(20, 10, 5, 0.95); border: 2px solid #8b6914; border-radius: 4px; padding: 20px; pointer-events: all;
  min-width: 400px; z-index: 100; }
  #inventory-panel h2 { color: #c9a634; text-align: center; margin-bottom: 10px; font-size: 18px; text-shadow: 0 0 10px
  #c9a634; }
  .inv-grid { display: grid; grid-template-columns: repeat(6, 50px); gap: 4px; margin: 10px auto; width: fit-content; }
  .inv-slot { width: 50px; height: 50px; border: 1px solid #5a4a2a; background: rgba(30, 20, 10, 0.8); display: flex;
  align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
  .inv-slot:hover { border-color: #c9a634; }
  .inv-slot.equipped { border-color: #4fc3f7; background: rgba(30, 60, 80, 0.8); }
  #stats-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background:
  rgba(20, 10, 5, 0.95); border: 2px solid #8b6914; border-radius: 4px; padding: 20px; pointer-events: all; min-width:
  300px; z-index: 100; color: #c9a634; }
  #stats-panel h2 { text-align: center; margin-bottom: 10px; font-size: 18px; text-shadow: 0 0 10px #c9a634; }
  .stat-line { margin: 4px 0; font-size: 14px; color: #d4c484; }
  .stat-val { color: #fff; float: right; }
  #msg-log { position: absolute; bottom: 100px; left: 10px; pointer-events: none; }
  .msg-line { font-size: 13px; margin: 2px 0; text-shadow: 1px 1px 2px #000; animation: fadeMsg 4s forwards; }
  @keyframes fadeMsg { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
  #game-title { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex;
  flex-direction: column; align-items: center; justify-content: center; z-index: 200; pointer-events: all; }
  #game-title h1 { color: #8b0000; font-size: 48px; text-shadow: 0 0 30px #8b0000, 0 0 60px #ff0000; margin-bottom:
  20px; letter-spacing: 8px; }
  #game-title .subtitle { color: #c9a634; font-size: 16px; margin-bottom: 40px; }
  #game-title button { background: #3a1a0a; border: 2px solid #8b6914; color: #c9a634; padding: 12px 40px; font-size:
  18px; cursor: pointer; font-family: 'Georgia', serif; transition: all 0.3s; margin: 5px; }
  #game-title button:hover { background: #5a2a1a; border-color: #c9a634; text-shadow: 0 0 10px #c9a634; }
  .class-select { display: flex; gap: 20px; margin: 20px 0; }
  .class-card { background: rgba(30, 15, 5, 0.8); border: 2px solid #5a4a2a; padding: 15px; cursor: pointer; text-align:
  center; color: #d4c484; transition: all 0.3s; width: 120px; }
  .class-card:hover, .class-card.selected { border-color: #c9a634; background: rgba(50, 25, 10, 0.8); }
  .class-card .icon { font-size: 36px; margin-bottom: 8px; }
  .class-card .name { font-size: 14px; color: #c9a634; }
  #death-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(100,
  0, 0, 0.7); z-index: 150; pointer-events: all; display: none; flex-direction: column; align-items: center;
  justify-content: center; }
  #death-screen h1 { color: #ff0000; font-size: 48px; text-shadow: 0 0 30px #ff0000; }
  #death-screen button { margin-top: 30px; background: #3a1a0a; border: 2px solid #8b0000; color: #ff4444; padding: 12px
  40px; font-size: 18px; cursor: pointer; font-family: 'Georgia', serif; }
  </style>
  </head>
  <body>

  <!-- Title Screen -->
  <div id="game-title">
    <h1>DIABLO</h1>
    <div class="subtitle">HTML5 Web Edition</div>
    <div class="class-select">
      <div class="class-card selected" data-class="warrior">
        <div class="icon">⚔️</div>
        <div class="name">战士</div>
      </div>
      <div class="class-card" data-class="rogue">
        <div class="icon">🏹</div>
        <div class="name">游侠</div>
      </div>
      <div class="class-card" data-class="sorcerer">
        <div class="icon">🔮</div>
        <div class="name">法师</div>
      </div>
    </div>
    <button id="btn-start">开始游戏</button>
  </div>

  <!-- Death Screen -->
  <div id="death-screen">
    <h1>你已阵亡</h1>
    <button onclick="location.reload()">重新开始</button>
  </div>

  <!-- Game Canvas -->
  <canvas id="game"></canvas>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="msg-log"></div>
    <div id="inventory-panel">
      <h2>🎒 背包</h2>
      <div id="equipped-section">
        <h3 style="color:#4fc3f7;font-size:14px;margin-bottom:5px;">装备栏</h3>
        <div class="inv-grid" id="equip-grid" style="grid-template-columns: repeat(4, 50px);"></div>
      </div>
      <div style="margin-top:10px;">
        <h3 style="color:#8b6914;font-size:14px;margin-bottom:5px;">物品栏</h3>
        <div class="inv-grid" id="bag-grid"></div>
      </div>
      <div style="text-align:center;margin-top:10px;">
        <button onclick="toggleInventory()" style="background:#3a1a0a;border:1px solid #8b6914;color:#c9a634;padding:5px
  20px;cursor:pointer;font-family:Georgia,serif;">关闭 [I]</button>
      </div>
    </div>
    <div id="stats-panel">
      <h2>📊 属性</h2>
      <div id="stats-content"></div>
      <div style="text-align:center;margin-top:10px;">
        <button onclick="toggleStats()" style="background:#3a1a0a;border:1px solid #8b6914;color:#c9a634;padding:5px
  20px;cursor:pointer;font-family:Georgia,serif;">关闭 [C]</button>
      </div>
    </div>
  </div>

  <script>
  // ==================== GAME CONSTANTS ====================
  const TILE = 32;
  const MAP_W = 80, MAP_H = 60;
  const CANVAS_W = 960, CANVAS_H = 640;
  const FOV_RADIUS = 8;
  const MINIMAP_SCALE = 3;

  // Tile types
  const WALL = 0, FLOOR = 1, DOOR = 2, STAIRS_DOWN = 3, STAIRS_UP = 4, CHEST = 5;

  // ==================== GLOBALS ====================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;

  let gameState = 'title'; // title, playing, dead, paused
  let selectedClass = 'warrior';
  let keys = {};
  let mouse = { x: 0, y: 0, worldX: 0, worldY: 0, down: false };
  let camera = { x: 0, y: 0 };
  let dungeon = null;
  let player = null;
  let enemies = [];
  let projectiles = [];
  let items = [];
  let particles = [];
  let floatingTexts = [];
  let currentLevel = 1;
  let messages = [];
  let showInventory = false;
  let showStats = false;
  let lastTime = 0;
  let gameTime = 0;
  let lightMap = [];
  let revealed = [];

  // ==================== CLASS DEFINITIONS ====================
  const CLASSES = {
    warrior: { name: '战士', icon: '⚔️', hp: 120, mp: 30, str: 30, dex: 20, vit: 25, mag: 10, attackRange: 40,
  attackSpeed: 1.2, damage: [8, 16], armor: 5 },
    rogue:   { name: '游侠', icon: '🏹', hp: 80,  mp: 50, str: 20, dex: 30, vit: 15, mag: 15, attackRange: 200,
  attackSpeed: 2.0, damage: [6, 14], armor: 3 },
    sorcerer:{ name: '法师', icon: '🔮', hp: 60,  mp: 100, str: 10, dex: 15, vit: 10, mag: 35, attackRange: 180,
  attackSpeed: 1.5, damage: [4, 10], armor: 1 }
  };

  // ==================== DUNGEON GENERATOR ====================
  class Room {
    constructor(x, y, w, h) { this.x = x; this.y = y; this.w = w; this.h = h; this.cx = Math.floor(x + w/2); this.cy =
  Math.floor(y + h/2); }
    intersects(other, pad = 2) {
      return !(this.x + this.w + pad < other.x || other.x + other.w + pad < this.x || this.y + this.h + pad < other.y ||
  other.y + other.h + pad < this.y);
    }
  }

  function generateDungeon(level) {
    const map = Array.from({length: MAP_H}, () => Array(MAP_W).fill(WALL));
    const rooms = [];
    const maxRooms = 12 + level * 2;
    const minSize = 5, maxSize = 12;

    for (let i = 0; i < maxRooms * 5; i++) {
      if (rooms.length >= maxRooms) break;
      const w = minSize + Math.floor(Math.random() * (maxSize - minSize));
      const h = minSize + Math.floor(Math.random() * (maxSize - minSize));
      const x = 1 + Math.floor(Math.random() * (MAP_W - w - 2));
      const y = 1 + Math.floor(Math.random() * (MAP_H - h - 2));
      const room = new Room(x, y, w, h);
      if (!rooms.some(r => room.intersects(r))) {
        rooms.push(room);
        for (let ry = y; ry < y + h; ry++)
          for (let rx = x; rx < x + w; rx++)
            map[ry][rx] = FLOOR;
      }
    }

    // Connect rooms with corridors
    for (let i = 1; i < rooms.length; i++) {
      const a = rooms[i - 1], b = rooms[i];
      let cx = a.cx, cy = a.cy;
      while (cx !== b.cx) { cx += (b.cx > cx) ? 1 : -1; map[cy][cx] = FLOOR; }
      while (cy !== b.cy) { cy += (b.cy > cy) ? 1 : -1; map[cy][cx] = FLOOR; }
    }

    // Place doors at corridor/room transitions
    for (let y = 1; y < MAP_H - 1; y++) {
      for (let x = 1; x < MAP_W - 1; x++) {
        if (map[y][x] === FLOOR) {
          if ((map[y-1][x] === WALL && map[y+1][x] === WALL && map[y][x-1] === FLOOR && map[y][x+1] === FLOOR) ||
              (map[y][x-1] === WALL && map[y][x+1] === WALL && map[y-1][x] === FLOOR && map[y+1][x] === FLOOR)) {
            if (Math.random() < 0.3) map[y][x] = DOOR;
          }
        }
      }
    }

    // Place stairs
    const startRoom = rooms[0];
    const endRoom = rooms[rooms.length - 1];
    map[startRoom.cy][startRoom.cx] = STAIRS_UP;
    map[endRoom.cy][endRoom.cx] = STAIRS_DOWN;

    // Place chests
    for (let i = 1; i < rooms.length - 1; i++) {
      if (Math.random() < 0.4) {
        const room = rooms[i];
        const cx = room.x + 1 + Math.floor(Math.random() * (room.w - 2));
        const cy = room.y + 1 + Math.floor(Math.random() * (room.h - 2));
        if (map[cy][cx] === FLOOR) map[cy][cx] = CHEST;
      }
    }

    return { map, rooms, startRoom, endRoom };
  }

  // ==================== ITEMS ====================
  const ITEM_TEMPLATES = [
    { name: '生命药水', icon: '❤️', type: 'potion', subtype: 'health', value: 30, rarity: 0 },
    { name: '法力药水', icon: '💙', type: 'potion', subtype: 'mana', value: 20, rarity: 0 },
    { name: '铁剑', icon: '🗡️', type: 'weapon', damage: [5, 12], rarity: 0 },
    { name: '钢剑', icon: '🗡️', type: 'weapon', damage: [8, 18], rarity: 1 },
    { name: '暗黑之刃', icon: '⚔️', type: 'weapon', damage: [15, 30], rarity: 2 },
    { name: '猎弓', icon: '🏹', type: 'weapon', damage: [6, 14], range: 200, rarity: 0 },
    { name: '长弓', icon: '🏹', type: 'weapon', damage: [10, 22], range: 250, rarity: 1 },
    { name: '法杖', icon: '🪄', type: 'weapon', damage: [4, 10], magicBonus: 10, rarity: 0 },
    { name: '橡木法杖', icon: '🪄', type: 'weapon', damage: [8, 18], magicBonus: 20, rarity: 1 },
    { name: '皮甲', icon: '🛡️', type: 'armor', armor: 3, rarity: 0 },
    { name: '链甲', icon: '🛡️', type: 'armor', armor: 6, rarity: 1 },
    { name: '板甲', icon: '🛡️', type: 'armor', armor: 10, rarity: 2 },
    { name: '木盾', icon: '🔰', type: 'shield', armor: 2, rarity: 0 },
    { name: '铁盾', icon: '🔰', type: 'shield', armor: 5, rarity: 1 },
    { name: '力量戒指', icon: '💍', type: 'ring', str: 5, rarity: 1 },
    { name: '敏捷项链', icon: '📿', type: 'amulet', dex: 5, rarity: 1 },
    { name: '黄金', icon: '💰', type: 'gold', value: 0, rarity: 0 },
  ];

  const RARITY_COLORS = ['#aaa', '#4fc3f7', '#c9a634', '#ff6b6b'];
  const RARITY_NAMES = ['普通', '魔法', '稀有', '传说'];

  function generateItem(level, forceType) {
    const templates = ITEM_TEMPLATES.filter(t => t.rarity <= Math.min(2, Math.floor(level / 3)));
    const template = templates[Math.floor(Math.random() * templates.length)];
    const item = { ...template, id: Math.random().toString(36).substr(2, 9) };

    if (item.type === 'gold') item.value = 5 + Math.floor(Math.random() * 20 * level);
    if (item.damage) item.damage = [item.damage[0] + level, item.damage[1] + level * 2];
    if (item.armor) item.armor += Math.floor(level / 2);

    return item;
  }

  // ==================== ENTITY CLASSES ====================
  class Player {
    constructor(className, x, y) {
      const cls = CLASSES[className];
      this.className = className;
      this.x = x; this.y = y;
      this.hp = cls.hp; this.maxHp = cls.hp;
      this.mp = cls.mp; this.maxMp = cls.mp;
      this.str = cls.str; this.dex = cls.dex; this.vit = cls.vit; this.mag = cls.mag;
      this.baseDamage = cls.damage;
      this.attackRange = cls.attackRange;
      this.attackSpeed = cls.attackSpeed;
      this.baseArmor = cls.armor;
      this.moveSpeed = 3;
      this.level = 1; this.exp = 0; this.expNext = 50;
      this.gold = 0;
      this.attackCooldown = 0;
      this.animFrame = 0; this.animTimer = 0;
      this.facing = 0; // 0=down,1=left,2=up,3=right
      this.moving = false;
      this.inventory = [];
      this.equipped = { weapon: null, armor: null, shield: null, ring: null, amulet: null };
      this.spells = [];
      this.potionHp = 2; this.potionMp = 1;
      this.invulnTimer = 0;
      this.lightRadius = FOV_RADIUS;

      // Give starting items
      this.inventory.push(generateItem(1));
      this.potionHp = 3; this.potionMp = 2;
    }

    get totalDamage() {
      let d = [...this.baseDamage];
      if (this.equipped.weapon && this.equipped.weapon.damage) {
        d[0] += this.equipped.weapon.damage[0]; d[1] += this.equipped.weapon.damage[1];
      }
      d[0] += Math.floor(this.str / 5); d[1] += Math.floor(this.str / 5);
      return d;
    }

    get totalArmor() {
      let a = this.baseArmor;
      if (this.equipped.armor) a += this.equipped.armor.armor;
      if (this.equipped.shield) a += this.equipped.shield.armor;
      return a;
    }

    get attackRangeActual() {
      if (this.equipped.weapon && this.equipped.weapon.range) return this.equipped.weapon.range;
      return this.attackRange;
    }

    gainExp(amount) {
      this.exp += amount;
      while (this.exp >= this.expNext) {
        this.exp -= this.expNext;
        this.level++;
        this.expNext = Math.floor(this.expNext * 1.5);
        this.maxHp += 10 + this.vit;
        this.maxMp += 5 + Math.floor(this.mag / 2);
        this.hp = this.maxHp; this.mp = this.maxMp;
        this.str += 2; this.dex += 2; this.vit += 2; this.mag += 2;
        addMessage(`🎉 升级！你现在是 ${this.level} 级！`, '#ff0');
        spawnParticles(this.x, this.y, '#ff0', 20);
      }
    }

    equip(item) {
      if (!item) return;
      const slot = item.type === 'weapon' ? 'weapon' : item.type === 'armor' ? 'armor' : item.type === 'shield' ?
  'shield' : item.type === 'ring' ? 'ring' : item.type === 'amulet' ? 'amulet' : null;
      if (!slot) return;
      const old = this.equipped[slot];
      this.equipped[slot] = item;
      this.inventory = this.inventory.filter(i => i.id !== item.id);
      if (old) this.inventory.push(old);
      addMessage(`装备了 ${item.icon} ${item.name}`, RARITY_COLORS[item.rarity]);
    }

    usePotion(type) {
      if (type === 'hp' && this.potionHp > 0) {
        this.potionHp--;
        const heal = 30 + this.level * 5;
        this.hp = Math.min(this.maxHp, this.hp + heal);
        addMessage(`使用生命药水，恢复 ${heal} HP`, '#4f4');
        spawnParticles(this.x, this.y, '#f00', 10);
        spawnFloatingText(this.x, this.y - 20, `+${heal}`, '#4f4');
      }
      if (type === 'mp' && this.potionMp > 0) {
        this.potionMp--;
        const restore = 20 + this.level * 3;
        this.mp = Math.min(this.maxMp, this.mp + restore);
        addMessage(`使用法力药水，恢复 ${restore} MP`, '#44f');
        spawnParticles(this.x, this.y, '#44f', 10);
      }
    }

    update(dt) {
      this.attackCooldown = Math.max(0, this.attackCooldown - dt);
      this.invulnTimer = Math.max(0, this.invulnTimer - dt);
      this.animTimer += dt;
      if (this.animTimer > 0.15) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

      // Natural regen
      this.hp = Math.min(this.maxHp, this.hp + dt * (1 + this.vit * 0.05));
      this.mp = Math.min(this.maxMp, this.mp + dt * (0.5 + this.mag * 0.03));
    }

    takeDamage(raw) {
      if (this.invulnTimer > 0) return 0;
      const reduction = this.totalArmor * 0.5;
      const dmg = Math.max(1, Math.floor(raw - reduction * (0.5 + Math.random() * 0.5)));
      this.hp -= dmg;
      this.invulnTimer = 0.3;
      spawnFloatingText(this.x, this.y - 20, `-${dmg}`, '#f44');
      spawnParticles(this.x, this.y, '#f00', 5);
      if (this.hp <= 0) { this.hp = 0; gameState = 'dead'; document.getElementById('death-screen').style.display =
  'flex'; }
      return dmg;
    }
  }

  class Enemy {
    constructor(type, x, y, level) {
      const defs = ENEMY_DEFS[type];
      this.type = type; this.x = x; this.y = y;
      this.name = defs.name; this.icon = defs.icon;
      this.hp = defs.hp + level * defs.hpPerLevel;
      this.maxHp = this.hp;
      this.damage = [defs.damage[0] + level, defs.damage[1] + level * 2];
      this.speed = defs.speed;
      this.attackRange = defs.attackRange;
      this.attackSpeed = defs.attackSpeed;
      this.exp = defs.exp + level * 5;
      this.attackCooldown = 0;
      this.aiState = 'idle';
      this.aiTimer = 0;
      this.targetX = x; this.targetY = y;
      this.animFrame = 0; this.animTimer = 0;
      this.level = level;
      this.stunTimer = 0;
      this.dropChance = defs.dropChance;
      this.goldDrop = [defs.goldDrop[0] + level, defs.goldDrop[1] + level * 3];
    }

    update(dt, playerX, playerY) {
      this.attackCooldown = Math.max(0, this.attackCooldown - dt);
      this.aiTimer -= dt;
      this.stunTimer = Math.max(0, this.stunTimer - dt);
      this.animTimer += dt;
      if (this.animTimer > 0.2) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }

      if (this.stunTimer > 0) return;

      const dist = Math.hypot(playerX - this.x, playerY - this.y);
      const sightRange = 200;

      if (dist < sightRange) {
        this.aiState = 'chase';
        if (dist < this.attackRange) {
          this.aiState = 'attack';
        }
      } else {
        this.aiState = 'idle';
        if (this.aiTimer <= 0) {
          this.targetX = this.x + (Math.random() - 0.5) * 100;
          this.targetY = this.y + (Math.random() - 0.5) * 100;
          this.aiTimer = 2 + Math.random() * 3;
        }
      }

      if (this.aiState === 'chase') {
        const angle = Math.atan2(playerY - this.y, playerX - this.x);
        const nx = this.x + Math.cos(angle) * this.speed * dt * 60;
        const ny = this.y + Math.sin(angle) * this.speed * dt * 60;
        if (canWalk(nx, this.y)) this.x = nx;
        if (canWalk(this.x, ny)) this.y = ny;
      } else if (this.aiState === 'idle') {
        const angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
        const nx = this.x + Math.cos(angle) * this.speed * 0.3 * dt * 60;
        const ny = this.y + Math.sin(angle) * this.speed * 0.3 * dt * 60;
        if (canWalk(nx, this.y)) this.x = nx;
        if (canWalk(this.x, ny)) this.y = ny;
      }
    }

    takeDamage(raw) {
      const dmg = Math.max(1, Math.floor(raw * (0.8 + Math.random() * 0.4)));
      this.hp -= dmg;
      spawnFloatingText(this.x, this.y - 20, `-${dmg}`, '#ff0');
      spawnParticles(this.x, this.y, '#f00', 3);
      this.stunTimer = 0.2;
      return dmg;
    }

    tryAttack(player) {
      if (this.attackCooldown > 0 || this.aiState !== 'attack') return false;
      this.attackCooldown = 1 / this.attackSpeed;
      const dmg = this.damage[0] + Math.floor(Math.random() * (this.damage[1] - this.damage[0]));
      player.takeDamage(dmg);
      return true;
    }

    dropLoot() {
      // Gold
      const gold = this.goldDrop[0] + Math.floor(Math.random() * (this.goldDrop[1] - this.goldDrop[0]));
      if (gold > 0) {
        const item = { ...ITEM_TEMPLATES.find(t => t.type === 'gold'), id: Math.random().toString(36).substr(2, 9),
  value: gold };
        items.push({ x: this.x + (Math.random()-0.5)*20, y: this.y + (Math.random()-0.5)*20, item });
      }
      // Item drop
      if (Math.random() < this.dropChance) {
        const item = generateItem(this.level);
        items.push({ x: this.x + (Math.random()-0.5)*20, y: this.y + (Math.random()-0.5)*20, item });
      }
      // Potion drop
      if (Math.random() < 0.3) {
        const potion = Math.random() < 0.6 ? generateHealthPotion(this.level) : generateManaPotion(this.level);
        items.push({ x: this.x + (Math.random()-0.5)*20, y: this.y + (Math.random()-0.5)*20, item: potion });
      }
    }
  }

  function generateHealthPotion(level) {
    return { id: Math.random().toString(36).substr(2, 9), name: '生命药水', icon: '❤️', type: 'potion', subtype:
  'health', value: 30 + level * 5, rarity: 0 };
  }
  function generateManaPotion(level) {
    return { id: Math.random().toString(36).substr(2, 9), name: '法力药水', icon: '💙', type: 'potion', subtype: 'mana',
  value: 20 + level * 3, rarity: 0 };
  }

  const ENEMY_DEFS = {
    zombie: { name: '僵尸', icon: '🧟', hp: 30, hpPerLevel: 10, damage: [3, 8], speed: 0.8, attackRange: 30,
  attackSpeed: 0.8, exp: 10, dropChance: 0.2, goldDrop: [1, 5] },
    skeleton: { name: '骷髅', icon: '💀', hp: 25, hpPerLevel: 8, damage: [4, 10], speed: 1.2, attackRange: 35,
  attackSpeed: 1.0, exp: 15, dropChance: 0.25, goldDrop: [2, 8] },
    demon: { name: '恶魔', icon: '👹', hp: 50, hpPerLevel: 15, damage: [6, 14], speed: 1.0, attackRange: 40,
  attackSpeed: 1.2, exp: 25, dropChance: 0.3, goldDrop: [5, 15] },
    ghost: { name: '幽灵', icon: '👻', hp: 20, hpPerLevel: 5, damage: [5, 12], speed: 1.8, attackRange: 100,
  attackSpeed: 1.5, exp: 20, dropChance: 0.2, goldDrop: [3, 10] },
    boss: { name: '暗黑骑士', icon: '🗡️', hp: 200, hpPerLevel: 50, damage: [10, 25], speed: 1.2, attackRange: 50,
  attackSpeed: 1.0, exp: 100, dropChance: 0.8, goldDrop: [20, 50] },
  };

  // ==================== PROJECTILE ====================
  class Projectile {
    constructor(x, y, angle, speed, damage, owner, color = '#ff0') {
      this.x = x; this.y = y;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.damage = damage;
      this.owner = owner; // 'player' or 'enemy'
      this.color = color;
      this.life = 3;
      this.pierce = false;
    }

    update(dt) {
      this.x += this.vx * dt * 60;
      this.y += this.vy * dt * 60;
      this.life -= dt;
      return this.life > 0 && canWalk(this.x, this.y);
    }
  }

  // ==================== PARTICLES ====================
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4 - 2,
        life: 0.5 + Math.random() * 0.5,
        color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function spawnFloatingText(x, y, text, color) {
    floatingTexts.push({ x, y, text, color, life: 1.5, vy: -1 });
  }

  // ==================== MAP HELPERS ====================
  function canWalk(wx, wy) {
    const tx = Math.floor(wx / TILE), ty = Math.floor(wy / TILE);
    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
    const tile = dungeon.map[ty][tx];
    return tile !== WALL;
  }

  function getTile(tx, ty) {
    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return WALL;
    return dungeon.map[ty][tx];
  }

  // ==================== FOV / LIGHTING ====================
  function computeFOV() {
    lightMap = Array.from({length: MAP_H}, () => Array(MAP_W).fill(0));
    const px = Math.floor(player.x / TILE), py = Math.floor(player.y / TILE);
    const R = player.lightRadius;

    for (let dy = -R; dy <= R; dy++) {
      for (let dx = -R; dx <= R; dx++) {
        const tx = px + dx, ty = py + dy;
        if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) continue;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > R) continue;

        // Raycast
        let blocked = false;
        const steps = Math.ceil(dist);
        for (let s = 1; s < steps; s++) {
          const t = s / steps;
          const rx = Math.floor(px + dx * t), ry = Math.floor(py + dy * t);
          if (dungeon.map[ry] && dungeon.map[ry][rx] === WALL) { blocked = true; break; }
        }

        if (!blocked) {
          const brightness = 1 - dist / (R + 1);
          lightMap[ty][tx] = Math.max(lightMap[ty][tx], brightness);
          revealed[ty][tx] = true;
        }
      }
    }
  }

  // ==================== MESSAGE LOG ====================
  function addMessage(text, color = '#fff') {
    messages.push({ text, color, time: gameTime });
    const log = document.getElementById('msg-log');
    const div = document.createElement('div');
    div.className = 'msg-line';
    div.style.color = color;
    div.textContent = text;
    log.appendChild(div);
    setTimeout(() => div.remove(), 4000);
    if (log.children.length > 8) log.children[0].remove();
  }

  // ==================== SPAWN ENEMIES ====================
  function spawnEnemies() {
    enemies = [];
    const types = ['zombie', 'skeleton', 'demon', 'ghost'];
    const count = 8 + currentLevel * 4;

    for (let i = 0; i < count; i++) {
      const room = dungeon.rooms[1 + Math.floor(Math.random() * (dungeon.rooms.length - 1))];
      const ex = (room.x + 1 + Math.floor(Math.random() * (room.w - 2))) * TILE + TILE/2;
      const ey = (room.y + 1 + Math.floor(Math.random() * (room.h - 2))) * TILE + TILE/2;
      const type = types[Math.floor(Math.random() * types.length)];
      enemies.push(new Enemy(type, ex, ey, currentLevel));
    }

    // Boss on every 3rd level
    if (currentLevel % 3 === 0) {
      const room = dungeon.endRoom;
      const bx = room.cx * TILE + TILE/2;
      const by = room.cy * TILE + TILE/2;
      enemies.push(new Enemy('boss', bx, by, currentLevel));
      addMessage('⚠️ 你感受到了强大的邪恶力量...', '#f44');
    }
  }

  // ==================== INIT LEVEL ====================
  function initLevel(level) {
    currentLevel = level;
    dungeon = generateDungeon(level);
    revealed = Array.from({length: MAP_H}, () => Array(MAP_W).fill(false));

    const startX = dungeon.startRoom.cx * TILE + TILE/2;
    const startY = dungeon.startRoom.cy * TILE + TILE/2;

    if (!player) {
      player = new Player(selectedClass, startX, startY);
    } else {
      player.x = startX; player.y = startY;
    }

    projectiles = []; items = []; particles = []; floatingTexts = [];
    spawnEnemies();
    addMessage(`🏰 进入地下城第 ${level} 层`, '#c9a634');
  }

  // ==================== UPDATE ====================
  function update(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    player.update(dt);

    // Player movement
    let dx = 0, dy = 0;
    if (keys['w'] || keys['arrowup']) dy -= 1;
    if (keys['s'] || keys['arrowdown']) dy += 1;
    if (keys['a'] || keys['arrowleft']) dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;

    player.moving = dx !== 0 || dy !== 0;
    if (player.moving) {
      const len = Math.sqrt(dx*dx + dy*dy);
      dx /= len; dy /= len;
      const nx = player.x + dx * player.moveSpeed * dt * 60;
      const ny = player.y + dy * player.moveSpeed * dt * 60;
      if (canWalk(nx, player.y)) player.x = nx;
      if (canWalk(player.x, ny)) player.y = ny;

      if (Math.abs(dx) > Math.abs(dy)) player.facing = dx > 0 ? 3 : 1;
      else player.facing = dy > 0 ? 0 : 2;
    }

    // Auto-attack: click or hold mouse
    if (mouse.down && player.attackCooldown <= 0) {
      const worldMX = mouse.x + camera.x;
      const worldMY = mouse.y + camera.y;
      const angle = Math.atan2(worldMY - player.y, worldMX - player.x);

      if (player.attackRangeActual <= 50) {
        // Melee attack
        player.attackCooldown = 1 / player.attackSpeed;
        const dmg = player.totalDamage[0] + Math.floor(Math.random() * (player.totalDamage[1] - player.totalDamage[0]));
        let hit = false;
        for (const enemy of enemies) {
          const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
          if (dist < player.attackRangeActual) {
            const eAngle = Math.atan2(enemy.y - player.y, enemy.x - player.x);
            const angleDiff = Math.abs(angle - eAngle);
            if (angleDiff < Math.PI / 2 || angleDiff > Math.PI * 1.5) {
              enemy.takeDamage(dmg);
              hit = true;
            }
          }
        }
        spawnParticles(player.x + Math.cos(angle) * 20, player.y + Math.sin(angle) * 20, '#ff0', 3);
      } else {
        // Ranged attack
        player.attackCooldown = 1 / player.attackSpeed;
        const dmg = player.totalDamage[0] + Math.floor(Math.random() * (player.totalDamage[1] - player.totalDamage[0]));
        const proj = new Projectile(player.x, player.y, angle, 8, dmg, 'player', '#ff0');
        projectiles.push(proj);
      }
    }

    // Update projectiles
    projectiles = projectiles.filter(p => {
      const alive = p.update(dt);
      if (p.owner === 'player') {
        for (const enemy of enemies) {
          if (Math.hypot(enemy.x - p.x, enemy.y - p.y) < 20) {
            enemy.takeDamage(p.damage);
            if (!p.pierce) return false;
          }
        }
      }
      if (p.owner === 'enemy') {
        if (Math.hypot(player.x - p.x, player.y - p.y) < 16) {
          player.takeDamage(p.damage);
          return false;
        }
      }
      return alive;
    });

    // Update enemies
    for (const enemy of enemies) {
      enemy.update(dt, player.x, player.y);
      enemy.tryAttack(player);
    }

    // Remove dead enemies
    enemies = enemies.filter(e => {
      if (e.hp <= 0) {
        player.gainExp(e.exp);
        e.dropLoot();
        spawnParticles(e.x, e.y, '#f00', 15);
        addMessage(`💀 击杀了 ${e.name}`, '#f88');
        return false;
      }
      return true;
    });

    // Pickup items
    items = items.filter(drop => {
      const dist = Math.hypot(drop.x - player.x, drop.y - player.y);
      if (dist < 30) {
        const item = drop.item;
        if (item.type === 'gold') {
          player.gold += item.value;
          addMessage(`拾取 ${item.value} 金币`, '#c9a634');
          spawnFloatingText(drop.x, drop.y, `+${item.value}💰`, '#c9a634');
        } else if (item.type === 'potion') {
          if (item.subtype === 'health') { player.potionHp++; addMessage(`拾取 ${item.icon} ${item.name}`, '#4f4'); }
          else { player.potionMp++; addMessage(`拾取 ${item.icon} ${item.name}`, '#44f'); }
        } else {
          if (player.inventory.length < 24) {
            player.inventory.push(item);
            addMessage(`拾取 ${item.icon} ${item.name}`, RARITY_COLORS[item.rarity]);
          } else {
            addMessage('背包已满！', '#f44');
            return true;
          }
        }
        return false;
      }
      return true;
    });

    // Check stairs
    const ptx = Math.floor(player.x / TILE), pty = Math.floor(player.y / TILE);
    if (getTile(ptx, pty) === STAIRS_DOWN) {
      initLevel(currentLevel + 1);
    }

    // Open chests
    if (getTile(ptx, pty) === CHEST) {
      dungeon.map[pty][ptx] = FLOOR;
      const item = generateItem(currentLevel);
      player.inventory.push(item);
      addMessage(`🎁 打开宝箱获得 ${item.icon} ${item.name}`, RARITY_COLORS[item.rarity]);
      spawnParticles(ptx * TILE + TILE/2, pty * TILE + TILE/2, '#c9a634', 15);
      // Extra gold
      const gold = 10 + Math.floor(Math.random() * 20 * currentLevel);
      player.gold += gold;
      addMessage(`获得 ${gold} 金币`, '#c9a634');
    }

    // Update particles
    particles = particles.filter(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= dt;
      return p.life > 0;
    });

    floatingTexts = floatingTexts.filter(f => {
      f.y += f.vy; f.life -= dt;
      return f.life > 0;
    });

    // Camera
    camera.x = player.x - CANVAS_W / 2;
    camera.y = player.y - CANVAS_H / 2;

    // FOV
    computeFOV();
  }

  // ==================== RENDER ====================
  const TILE_COLORS = {
    [WALL]: '#1a1a2e',
    [FLOOR]: '#2d2d1e',
    [DOOR]: '#6b4c2a',
    [STAIRS_DOWN]: '#4a3a6e',
    [STAIRS_UP]: '#3a6e4a',
    [CHEST]: '#6b5a2a'
  };

  const WALL_TOP = '#2a2a3e';
  const WALL_SIDE = '#0f0f1e';

  function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    if (gameState === 'title') return;

    // Compute visible tile range
    const startTX = Math.max(0, Math.floor(camera.x / TILE));
    const startTY = Math.max(0, Math.floor(camera.y / TILE));
    const endTX = Math.min(MAP_W, Math.ceil((camera.x + CANVAS_W) / TILE) + 1);
    const endTY = Math.min(MAP_H, Math.ceil((camera.y + CANVAS_H) / TILE) + 1);

    // Draw tiles
    for (let ty = startTY; ty < endTY; ty++) {
      for (let tx = startTX; tx < endTX; tx++) {
        const tile = dungeon.map[ty][tx];
        const sx = tx * TILE - camera.x;
        const sy = ty * TILE - camera.y;

        if (!revealed[ty] || !revealed[ty][tx]) continue;

        const light = lightMap[ty][tx];
        if (light <= 0.05) continue;

        ctx.globalAlpha = Math.min(1, light + 0.1);

        if (tile === WALL) {
          // Draw wall with 3D effect
          ctx.fillStyle = WALL_SIDE;
          ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = WALL_TOP;
          ctx.fillRect(sx, sy, TILE, TILE * 0.4);
          // Wall detail
          ctx.fillStyle = '#35354a';
          ctx.fillRect(sx + 2, sy + 2, TILE - 4, 2);
        } else if (tile === FLOOR) {
          ctx.fillStyle = TILE_COLORS[FLOOR];
          ctx.fillRect(sx, sy, TILE, TILE);
          // Floor detail
          ctx.fillStyle = '#3a3a28';
          ctx.fillRect(sx, sy, 1, TILE);
          ctx.fillRect(sx, sy, TILE, 1);
          if ((tx + ty) % 7 === 0) {
            ctx.fillStyle = '#3d3d25';
            ctx.fillRect(sx + 8, sy + 8, 4, 4);
          }
        } else if (tile === DOOR) {
          ctx.fillStyle = TILE_COLORS[FLOOR];
          ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = TILE_COLORS[DOOR];
          ctx.fillRect(sx + 4, sy + 2, TILE - 8, TILE - 4);
          ctx.fillStyle = '#8b6c3a';
          ctx.fillRect(sx + TILE/2 - 2, sy + TILE/2 - 2, 4, 4);
        } else if (tile === STAIRS_DOWN) {
          ctx.fillStyle = TILE_COLORS[FLOOR];
          ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = TILE_COLORS[STAIRS_DOWN];
          ctx.fillRect(sx + 4, sy + 4, TILE - 8, TILE - 8);
          ctx.fillStyle = '#6a5a8e';
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(sx + 8, sy + 6 + i * 7, TILE - 16, 3);
          }
          // Glow
          ctx.fillStyle = `rgba(100, 80, 160, ${0.3 + Math.sin(gameTime * 3) * 0.2})`;
          ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
        } else if (tile === STAIRS_UP) {
          ctx.fillStyle = TILE_COLORS[FLOOR];
          ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = TILE_COLORS[STAIRS_UP];
          ctx.fillRect(sx + 4, sy + 4, TILE - 8, TILE - 8);
          ctx.fillStyle = '#5a8e6a';
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(sx + 8, sy + 6 + i * 7, TILE - 16, 3);
          }
        } else if (tile === CHEST) {
          ctx.fillStyle = TILE_COLORS[FLOOR];
          ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = '#8b7a2a';
          ctx.fillRect(sx + 6, sy + 8, TILE - 12, TILE - 14);
          ctx.fillStyle = '#c9a634';
          ctx.fillRect(sx + TILE/2 - 3, sy + TILE/2 - 2, 6, 4);
          ctx.fillStyle = '#6b5a1a';
          ctx.fillRect(sx + 6, sy + TILE/2 - 1, TILE - 12, 2);
        }
      }
    }

    ctx.globalAlpha = 1;

    // Draw items
    for (const drop of items) {
      const sx = drop.x - camera.x, sy = drop.y - camera.y;
      const tx = Math.floor(drop.x / TILE), ty = Math.floor(drop.y / TILE);
      if (!lightMap[ty] || lightMap[ty][tx] < 0.1) continue;

      ctx.globalAlpha = 0.8 + Math.sin(gameTime * 4) * 0.2;
      ctx.font = '20px serif';
      ctx.textAlign = 'center';
      ctx.fillText(drop.item.icon, sx, sy + 6);
      ctx.globalAlpha = 1;
    }

    // Draw enemies
    for (const enemy of enemies) {
      const sx = enemy.x - camera.x, sy = enemy.y - camera.y;
      const tx = Math.floor(enemy.x / TILE), ty = Math.floor(enemy.y / TILE);
      if (!lightMap[ty] || lightMap[ty][tx] < 0.1) continue;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(sx, sy + 12, 12, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      // Body bob
      const bob = enemy.aiState === 'chase' || enemy.aiState === 'attack' ? Math.sin(gameTime * 8) * 2 : 0;

      // Hit flash
      if (enemy.stunTimer > 0) ctx.globalAlpha = 0.5;

      // Draw enemy sprite
      ctx.font = '28px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(enemy.icon, sx, sy + bob - 4);

      ctx.globalAlpha = 1;

      // Health bar
      if (enemy.hp < enemy.maxHp) {
        const barW = 30, barH = 4;
        const hpRatio = enemy.hp / enemy.maxHp;
        ctx.fillStyle = '#333';
        ctx.fillRect(sx - barW/2, sy - 20, barW, barH);
        ctx.fillStyle = hpRatio > 0.5 ? '#4a4' : hpRatio > 0.25 ? '#aa4' : '#a44';
        ctx.fillRect(sx - barW/2, sy - 20, barW * hpRatio, barH);
      }

      // Name
      ctx.font = '10px Georgia';
      ctx.fillStyle = '#f88';
      ctx.textAlign = 'center';
      ctx.fillText(enemy.name, sx, sy - 24);
    }

    // Draw player
    if (player) {
      const sx = player.x - camera.x, sy = player.y - camera.y;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(sx, sy + 14, 14, 7, 0, 0, Math.PI * 2);
      ctx.fill();

      // Invuln flash
      if (player.invulnTimer > 0 && Math.sin(gameTime * 30) > 0) ctx.globalAlpha = 0.5;

      // Player body
      const bob = player.moving ? Math.sin(gameTime * 10) * 3 : 0;
      const icons = { warrior: '⚔️', rogue: '🏹', sorcerer: '🔮' };
      ctx.font = '32px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(icons[player.className], sx, sy + bob - 6);

      ctx.globalAlpha = 1;

      // Attack range indicator when attacking
      if (player.attackCooldown > 0.8 / player.attackSpeed) {
        ctx.strokeStyle = 'rgba(255, 200, 50, 0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(sx, sy, player.attackRangeActual, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Draw projectiles
    for (const p of projectiles) {
      const sx = p.x - camera.x, sy = p.y - camera.y;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(sx, sy, 4, 0, Math.PI * 2);
      ctx.fill();
      // Trail
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(sx - p.vx * 2, sy - p.vy * 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Draw particles
    for (const p of particles) {
      const sx = p.x - camera.x, sy = p.y - camera.y;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(sx - p.size/2, sy - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Floating texts
    for (const f of floatingTexts) {
      const sx = f.x - camera.x, sy = f.y - camera.y;
      ctx.globalAlpha = Math.min(1, f.life);
      ctx.font = 'bold 14px Georgia';
      ctx.fillStyle = f.color;
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText(f.text, sx, sy);
      ctx.fillText(f.text, sx, sy);
    }
    ctx.globalAlpha = 1;

    // Fog of war (overlay unlit areas)
    for (let ty = startTY; ty < endTY; ty++) {
      for (let tx = startTX; tx < endTX; tx++) {
        if (!revealed[ty] || !revealed[ty][tx]) {
          ctx.fillStyle = '#000';
          ctx.fillRect(tx * TILE - camera.x, ty * TILE - camera.y, TILE, TILE);
        } else if (lightMap[ty][tx] < 0.05) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(tx * TILE - camera.x, ty * TILE - camera.y, TILE, TILE);
        }
      }
    }

    // Draw HUD
    drawHUD();

    // Draw minimap
    drawMinimap();
  }

  function drawHUD() {
    if (!player) return;

    const hudY = CANVAS_H - 80;

    // Bottom bar background
    ctx.fillStyle = 'rgba(20, 10, 5, 0.85)';
    ctx.fillRect(0, hudY, CANVAS_W, 80);
    ctx.strokeStyle = '#8b6914';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, hudY, CANVAS_W, 80);

    // Health globe (left)
    drawGlobe(70, hudY + 40, 30, player.hp / player.maxHp, '#8b0000', '#ff2222', '#cc0000');
    ctx.font = 'bold 12px Georgia';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(`${Math.ceil(player.hp)}/${player.maxHp}`, 70, hudY + 44);

    // Mana globe (right)
    drawGlobe(CANVAS_W - 70, hudY + 40, 30, player.mp / player.maxMp, '#00008b', '#2222ff', '#0000cc');
    ctx.fillStyle = '#fff';
    ctx.fillText(`${Math.ceil(player.mp)}/${player.maxMp}`, CANVAS_W - 70, hudY + 44);

    // Experience bar (center)
    const expBarW = CANVAS_W - 240;
    const expBarX = 120;
    const expBarY = hudY + 58;
    ctx.fillStyle = '#222';
    ctx.fillRect(expBarX, expBarY, expBarW, 12);
    ctx.fillStyle = '#c9a634';
    ctx.fillRect(expBarX, expBarY, expBarW * (player.exp / player.expNext), 12);
    ctx.strokeStyle = '#5a4a2a';
    ctx.lineWidth = 1;
    ctx.strokeRect(expBarX, expBarY, expBarW, 12);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(`Lv.${player.level}  EXP: ${player.exp}/${player.expNext}`, CANVAS_W / 2, expBarY + 10);

    // Potion slots
    const potionY = hudY + 20;
    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    // HP potions
    ctx.fillStyle = 'rgba(139, 0, 0, 0.5)';
    ctx.fillRect(CANVAS_W/2 - 60, potionY - 8, 40, 28);
    ctx.strokeStyle = '#8b0000';
    ctx.strokeRect(CANVAS_W/2 - 60, potionY - 8, 40, 28);
    ctx.fillText('❤️', CANVAS_W/2 - 40, potionY + 8);
    ctx.fillStyle = '#fff';
    ctx.font = '12px Georgia';
    ctx.fillText(`x${player.potionHp}`, CANVAS_W/2 - 40, potionY + 24);

    // MP potions
    ctx.font = '20px serif';
    ctx.fillStyle = 'rgba(0, 0, 139, 0.5)';
    ctx.fillRect(CANVAS_W/2 + 20, potionY - 8, 40, 28);
    ctx.strokeStyle = '#00008b';
    ctx.strokeRect(CANVAS_W/2 + 20, potionY - 8, 40, 28);
    ctx.fillText('💙', CANVAS_W/2 + 40, potionY + 8);
    ctx.fillStyle = '#fff';
    ctx.font = '12px Georgia';
    ctx.fillText(`x${player.potionMp}`, CANVAS_W/2 + 40, potionY + 24);

    // Hotkey hints
    ctx.fillStyle = '#888';
    ctx.font = '9px Georgia';
    ctx.fillText('[Q]', CANVAS_W/2 - 40, potionY + 36);
    ctx.fillText('[E]', CANVAS_W/2 + 40, potionY + 36);

    // Gold
    ctx.font = '14px Georgia';
    ctx.fillStyle = '#c9a634';
    ctx.textAlign = 'left';
    ctx.fillText(`💰 ${player.gold}`, CANVAS_W/2 - 90, hudY + 18);

    // Level info
    ctx.textAlign = 'right';
    ctx.fillStyle = '#888';
    ctx.fillText(`地下城 Lv.${currentLevel}`, CANVAS_W - 120, hudY + 18);

    // Controls hint
    ctx.textAlign = 'center';
    ctx.font = '10px Georgia';
    ctx.fillStyle = '#666';
    ctx.fillText('[I]背包 [C]属性 [Q]红药 [E]蓝药 [1-6]装备', CANVAS_W / 2, hudY - 4);
  }

  function drawGlobe(cx, cy, r, ratio, darkColor, lightColor, borderColor) {
    // Background
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Fill
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r - 2, 0, Math.PI * 2);
    ctx.clip();

    const fillH = (r * 2) * ratio;
    const grad = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
    grad.addColorStop(0, lightColor);
    grad.addColorStop(1, darkColor);
    ctx.fillStyle = grad;
    ctx.fillRect(cx - r, cy + r - fillH, r * 2, fillH);

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.ellipse(cx - 5, cy - 8, 8, 12, -0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawMinimap() {
    const mmW = MAP_W * MINIMAP_SCALE;
    const mmH = MAP_H * MINIMAP_SCALE;
    const mmX = CANVAS_W - mmW - 10;
    const mmY = 10;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(mmX - 1, mmY - 1, mmW + 2, mmH + 2);

    for (let ty = 0; ty < MAP_H; ty++) {
      for (let tx = 0; tx < MAP_W; tx++) {
        if (!revealed[ty] || !revealed[ty][tx]) continue;
        const tile = dungeon.map[ty][tx];
        const px = mmX + tx * MINIMAP_SCALE;
        const py = mmY + ty * MINIMAP_SCALE;

        if (tile === WALL) ctx.fillStyle = '#333';
        else if (tile === FLOOR) ctx.fillStyle = '#555';
        else if (tile === DOOR) ctx.fillStyle = '#654';
        else if (tile === STAIRS_DOWN) ctx.fillStyle = '#64a';
        else if (tile === STAIRS_UP) ctx.fillStyle = '#4a6';
        else if (tile === CHEST) ctx.fillStyle = '#a84';

        ctx.fillRect(px, py, MINIMAP_SCALE, MINIMAP_SCALE);
      }
    }

    // Enemies on minimap
    for (const enemy of enemies) {
      const etx = Math.floor(enemy.x / TILE), ety = Math.floor(enemy.y / TILE);
      if (lightMap[ety] && lightMap[ety][etx] > 0.1) {
        ctx.fillStyle = '#f00';
        ctx.fillRect(mmX + etx * MINIMAP_SCALE, mmY + ety * MINIMAP_SCALE, MINIMAP_SCALE, MINIMAP_SCALE);
      }
    }

    // Player on minimap
    const ptx = Math.floor(player.x / TILE), pty = Math.floor(player.y / TILE);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(mmX + ptx * MINIMAP_SCALE - 1, mmY + pty * MINIMAP_SCALE - 1, MINIMAP_SCALE + 2, MINIMAP_SCALE + 2);

    // Border
    ctx.strokeStyle = '#8b6914';
    ctx.lineWidth = 1;
    ctx.strokeRect(mmX - 1, mmY - 1, mmW + 2, mmH + 2);
  }

  // ==================== INVENTORY UI ====================
  function toggleInventory() {
    showInventory = !showInventory;
    document.getElementById('inventory-panel').style.display = showInventory ? 'block' : 'none';
    if (showInventory) renderInventory();
    if (showStats) { showStats = false; document.getElementById('stats-panel').style.display = 'none'; }
  }

  function renderInventory() {
    if (!player) return;

    // Equipped
    const equipGrid = document.getElementById('equip-grid');
    equipGrid.innerHTML = '';
    const slots = ['weapon', 'armor', 'shield', 'ring', 'amulet'];
    const slotNames = { weapon: '武器', armor: '护甲', shield: '盾牌', ring: '戒指', amulet: '项链' };

    for (const slot of slots) {
      const div = document.createElement('div');
      div.className = 'inv-slot equipped';
      const item = player.equipped[slot];
      if (item) {
        div.innerHTML = item.icon;
        div.title = `${item.name} (${RARITY_NAMES[item.rarity]})`;
        div.style.color = RARITY_COLORS[item.rarity];
        div.onclick = () => {
          player.inventory.push(item);
          player.equipped[slot] = null;
          renderInventory();
        };
      } else {
        div.innerHTML = '<span style="color:#555;font-size:10px;">' + slotNames[slot] + '</span>';
      }
      equipGrid.appendChild(div);
    }

    // Bag
    const bagGrid = document.getElementById('bag-grid');
    bagGrid.innerHTML = '';

    for (let i = 0; i < 24; i++) {
      const div = document.createElement('div');
      div.className = 'inv-slot';
      if (i < player.inventory.length) {
        const item = player.inventory[i];
        div.innerHTML = item.icon;
        div.title = `${item.name} (${RARITY_NAMES[item.rarity]})`;
        div.style.color = RARITY_COLORS[item.rarity];
        div.onclick = () => {
          if (item.type === 'potion') {
            if (item.subtype === 'health') player.potionHp++;
            else player.potionMp++;
            player.inventory.splice(i, 1);
            addMessage(`使用了 ${item.icon} ${item.name}`, '#aaa');
          } else if (['weapon', 'armor', 'shield', 'ring', 'amulet'].includes(item.type)) {
            player.equip(item);
          }
          renderInventory();
        };
      }
      bagGrid.appendChild(div);
    }
  }

  function toggleStats() {
    showStats = !showStats;
    document.getElementById('stats-panel').style.display = showStats ? 'block' : 'none';
    if (showStats) renderStats();
    if (showInventory) { showInventory = false; document.getElementById('inventory-panel').style.display = 'none'; }
  }

  function renderStats() {
    if (!player) return;
    const c = document.getElementById('stats-content');
    const d = player.totalDamage;
    c.innerHTML = `
      <div class="stat-line">等级 <span class="stat-val">${player.level}</span></div>
      <div class="stat-line">职业 <span class="stat-val">${CLASSES[player.className].name}</span></div>
      <div class="stat-line">生命 <span class="stat-val">${Math.ceil(player.hp)} / ${player.maxHp}</span></div>
      <div class="stat-line">法力 <span class="stat-val">${Math.ceil(player.mp)} / ${player.maxMp}</span></div>
      <div class="stat-line">攻击 <span class="stat-val">${d[0]} - ${d[1]}</span></div>
      <div class="stat-line">护甲 <span class="stat-val">${player.totalArmor}</span></div>
      <div class="stat-line">力量 <span class="stat-val">${player.str}</span></div>
      <div class="stat-line">敏捷 <span class="stat-val">${player.dex}</span></div>
      <div class="stat-line">体力 <span class="stat-val">${player.vit}</span></div>
      <div class="stat-line">魔力 <span class="stat-val">${player.mag}</span></div>
      <div class="stat-line">攻击范围 <span class="stat-val">${player.attackRangeActual}</span></div>
      <div class="stat-line">攻击速度 <span class="stat-val">${player.attackSpeed.toFixed(1)}/s</span></div>
      <div class="stat-line">金币 <span class="stat-val" style="color:#c9a634">${player.gold}</span></div>
    `;
  }

  // ==================== INPUT ====================
  document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;

    if (gameState === 'playing') {
      if (e.key.toLowerCase() === 'i') toggleInventory();
      if (e.key.toLowerCase() === 'c') toggleStats();
      if (e.key.toLowerCase() === 'q') player.usePotion('hp');
      if (e.key.toLowerCase() === 'e') player.usePotion('mp');
      // Number keys to equip from inventory
      const num = parseInt(e.key);
      if (num >= 1 && num <= 6 && player.inventory.length >= num) {
        const item = player.inventory[num - 1];
        if (['weapon', 'armor', 'shield', 'ring', 'amulet'].includes(item.type)) {
          player.equip(item);
          if (showInventory) renderInventory();
        }
      }
    }
  });

  document.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
  });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - rect.left) * (CANVAS_W / rect.width);
    mouse.y = (e.clientY - rect.top) * (CANVAS_H / rect.height);
    mouse.worldX = mouse.x + camera.x;
    mouse.worldY = mouse.y + camera.y;
  });

  canvas.addEventListener('mousedown', e => {
    mouse.down = true;
    e.preventDefault();
  });

  canvas.addEventListener('mouseup', e => {
    mouse.down = false;
  });

  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // Class selection
  document.querySelectorAll('.class-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.class-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedClass = card.dataset.class;
    });
  });

  // Start button
  document.getElementById('btn-start').addEventListener('click', () => {
    document.getElementById('game-title').style.display = 'none';
    gameState = 'playing';
    initLevel(1);
  });

  // ==================== GAME LOOP ====================
  function gameLoop(timestamp) {
    const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
    lastTime = timestamp;

    update(dt);
    render();

    requestAnimationFrame(gameLoop);
  }

  requestAnimationFrame(timestamp => {
    lastTime = timestamp;
    gameLoop(timestamp);
  });
  </script>
  </body>
  </html>
