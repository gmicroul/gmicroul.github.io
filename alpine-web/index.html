<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111513">
  <title>Alpine Linux Web Desktop</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="vendor/v86/libv86.js"></script>
  <script defer src="app.js?v=5"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand" aria-label="Alpine Linux Web Desktop">
      <span class="brand-mark" aria-hidden="true">A</span>
      <div>
        <h1>Alpine Linux Web Desktop</h1>
        <p>Alpine 3.24 x86 / NetSurf</p>
      </div>
    </div>

    <div class="runtime-status" role="status" aria-live="polite">
      <span id="status-dot" class="status-dot is-loading"></span>
      <span id="status-text">正在加载运行环境</span>
    </div>
  </header>

  <main class="workspace">
    <section class="emulator" aria-label="Alpine Linux 模拟器">
      <div class="toolbar" aria-label="模拟器控制">
        <div class="toolbar-group">
          <button id="run-toggle" class="icon-button" type="button" disabled
                  aria-label="暂停" title="暂停">
            <span id="run-icon" aria-hidden="true">&#x23F8;</span>
          </button>
          <button id="restart" class="icon-button" type="button" disabled
                  aria-label="重新启动" title="重新启动">
            <span aria-hidden="true">&#x21BB;</span>
          </button>
          <button id="screenshot" class="icon-button" type="button" disabled
                  aria-label="保存截图" title="保存截图">
            <span aria-hidden="true">&#x25C9;</span>
          </button>
          <button id="fullscreen" class="icon-button" type="button" disabled
                  aria-label="全屏" title="全屏">
            <span aria-hidden="true">&#x26F6;</span>
          </button>
        </div>
        <span id="display-mode" class="display-mode">1024 x 768</span>
      </div>

      <div id="screen-frame" class="screen-frame">
        <div id="screen-container" class="screen-container" tabindex="0"
             aria-label="Alpine Linux 屏幕，点击后可使用键盘和鼠标">
          <div class="text-screen"></div>
          <canvas class="graphic-screen"></canvas>
        </div>

        <div id="loading-layer" class="loading-layer">
          <div class="loader" aria-hidden="true"></div>
          <p id="loading-title">准备虚拟机</p>
          <div class="progress-track" aria-hidden="true">
            <span id="progress-bar"></span>
          </div>
          <span id="loading-detail">0%</span>
        </div>

        <div id="error-layer" class="error-layer" hidden>
          <strong>无法启动 Alpine Linux</strong>
          <p id="error-message"></p>
          <button id="retry" type="button">重试</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>v86 / WebAssembly / <span id="memory-size">512 MB</span></span>
    <nav aria-label="项目资源">
      <a href="https://alpinelinux.org/" target="_blank" rel="noreferrer">Alpine Linux</a>
      <a href="https://www.netsurf-browser.org/" target="_blank" rel="noreferrer">NetSurf</a>
      <a href="https://github.com/copy/v86" target="_blank" rel="noreferrer">v86</a>
    </nav>
  </footer>
</body>
</html>
