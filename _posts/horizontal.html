<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Gallery</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a1a;
    }
    .gallery {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .gallery a {
      display: block;
      transition: transform 0.3s ease;
    }
    .gallery a:hover {
      transform: scale(1.05);
    }
    .gallery img {
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="gallery">
    <a href="https://gmicroul.github.io/diablo-web.html" target="_blank">
      <img width="300" height="300" src="https://github.com/user-attachments/assets/32f7a4a0-44d6-42b1-a807-c502223d1ec2" alt="Diablo Web" />
    </a>
    <a href="https://gmicroul.github.io/circle_jump.html" target="_blank">
      <img width="300" height="300" src="https://github.com/user-attachments/assets/44eb09e6-adc2-4ca1-8d36-66c72922f9c9" alt="Circle Jump" />
    </a>
    <a href="https://gmicroul.github.io/chicken-farm-v3.html" target="_blank">
      <img width="300" height="300" src="https://github.com/user-attachments/assets/b6bbb804-10ce-49c8-96fa-ec8861622cc9" alt="Chicken Farm" />
    </a>
  </div>
</body>
</html>
