  function getItemSellValue(item) {
    if (!item) return 0;
    if (item.type === 'potion') return Math.max(3, Math.floor((item.value || 10) * 0.25));
    if (!isEquipment(item)) return 0;
    return Math.max(5, Math.floor((item.score || computeItemScore(item)) * (0.45 + item.rarity * 0.18)));
  }

  function sellInventoryItem(index) {
    if (!player || index < 0 || index >= player.inventory.length) return;
    var item = player.inventory[index];
    var value = getItemSellValue(item);
    player.inventory.splice(index, 1);
    player.gold += value;
    hideItemTooltip();
    addMessage('出售 ' + item.icon + ' ' + item.name + '，获得 ' + value + ' 金币', '#c9a634');
    SFX.pickupGold();
    renderInventory();
  }

  function dropInventoryItem(index) {
    if (!player || index < 0 || index >= player.inventory.length) return;
    var item = player.inventory[index];
    player.inventory.splice(index, 1);
    items.push({
      x: player.x + (Math.random() - 0.5) * 28,
      y: player.y + (Math.random() - 0.5) * 28,
      item: item
    });
    hideItemTooltip();
    addMessage('丢弃 ' + item.icon + ' ' + item.name, '#aaa');
    renderInventory();
  }

  function renderInventory() {
    if (!player) return;
    var eg = document.getElementById('equip-grid');
    eg.innerHTML = '';
    var slots = ['weapon', 'armor', 'shield', 'ring', 'amulet'];
    var slotNames = { weapon: '武器', armor: '护甲', shield: '盾牌', ring: '戒指', amulet: '项链' };
    for (var si = 0; si < slots.length; si++) {
      var s = slots[si];
      var d = document.createElement('div');
      d.className = 'inv-slot equipped';
      var it = player.equipped[s];
      if (it) {
        d.className += ' quality-' + it.rarity;
        d.innerHTML = it.icon + '<span style="position:absolute;font-size:9px;right:3px;bottom:1px;color:#ddd;text-shadow:1px 1px 2px #000">' + (it.score || computeItemScore(it)) + '</span>';
        d.style.position = 'relative';
        d.style.color = RARITY_COLORS[it.rarity];
        bindItemTooltip(d, it);
        (function(item, slotName) {
          d.onclick = function() {
            hideItemTooltip();
            player.inventory.push(item);
            player.equipped[slotName] = null;
            player.hp = Math.min(player.hp, player.getMaxHp());
            player.mp = Math.min(player.mp, player.getMaxMp());
            renderInventory();
          };
        })(it, s);
      } else {
        d.innerHTML = '<span style="color:#555;font-size:10px">' + slotNames[s] + '</span>';
      }
      eg.appendChild(d);
    }
    var bg = document.getElementById('bag-grid');
    bg.innerHTML = '';
    for (var bi = 0; bi < 24; bi++) {
      var bd = document.createElement('div');
      bd.className = 'inv-slot';
      if (bi < player.inventory.length) {
        var bit = player.inventory[bi];
        bd.className += ' quality-' + bit.rarity;
        bd.innerHTML = bit.icon + (isEquipment(bit) ? '<span style="position:absolute;font-size:9px;right:3px;bottom:1px;color:#ddd;text-shadow:1px 1px 2px #000">' + (bit.score || computeItemScore(bit)) + '</span>' : '');
        bd.style.position = 'relative';
        bd.style.color = RARITY_COLORS[bit.rarity];
        bindItemTooltip(bd, bit);
        (function(item, index) {
          bd.onclick = function(e) {
            hideItemTooltip();
            if (e && e.shiftKey) {
              sellInventoryItem(index);
              return;
            }
            if (item.type === 'potion') {
              if (item.subtype === 'health') player.potionHp++; else player.potionMp++;
              player.inventory.splice(index, 1);
              addMessage('使用了 ' + item.icon + ' ' + item.name, '#aaa');
            } else if (['weapon', 'armor', 'shield', 'ring', 'amulet'].indexOf(item.type) >= 0) {
              player.equip(item);
            }
            renderInventory();
          };
          bd.oncontextmenu = function(e) {
            e.preventDefault();
            dropInventoryItem(index);
          };
          var pressTimer = null;
          bd.addEventListener('pointerdown', function(e) {
            if (e.pointerType !== 'touch') return;
            pressTimer = setTimeout(function() { dropInventoryItem(index); pressTimer = null; }, 650);
          });
          ['pointerup', 'pointercancel', 'pointerleave'].forEach(function(type) {
            bd.addEventListener(type, function() {
              if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            });
          });
        })(bit, bi);
      }
      bg.appendChild(bd);
    }
  }

  function renderSkills() {
    if (!player) return;
    var c = document.getElementById('skills-content');
    var tree = SKILL_TREES[player.className] || [];
    var html = '<div class="skill-points">' + CLASSES[player.className].name + ' · 可用技能点: <span class="tooltip-good">' + player.skillPoints + '</span></div>';
    html += '<div class="skill-grid">';
    for (var i = 0; i < tree.length; i++) {
      var skill = tree[i];
      var rank = player.skills[skill.id] || 0;
      var locked = player.level < skill.reqLevel;
      var maxed = rank >= skill.max;
      var cls = 'skill-node' + (locked ? ' locked' : '') + (maxed ? ' maxed' : '');
      var totalStats = {};
      for (var stat in skill.stats) totalStats[stat] = skill.stats[stat] * Math.max(1, rank);
      html += '<div class="' + cls + '" data-skill="' + escapeHtml(skill.id) + '">';
      html += '<div class="skill-title">' + escapeHtml(skill.icon + ' ' + skill.name) + '</div>';
      html += '<div class="skill-rank">等级 ' + rank + ' / ' + skill.max + ' · 需求 Lv.' + skill.reqLevel + '</div>';
      html += '<div class="skill-desc">' + escapeHtml(skill.desc) + '</div>';
      html += '<div class="tooltip-line"></div>' + formatBonusStats(totalStats);
      if (locked) html += '<div class="tooltip-bad">等级不足</div>';
      else if (maxed) html += '<div class="tooltip-muted">已满级</div>';
      else if (player.skillPoints <= 0) html += '<div class="tooltip-muted">需要技能点</div>';
      else html += '<div class="tooltip-good">点击升级</div>';
      html += '</div>';
    }
    html += '</div>';
    c.innerHTML = html;
    var nodes = c.querySelectorAll('.skill-node');
    for (var n = 0; n < nodes.length; n++) {
      nodes[n].addEventListener('click', function() {
        var id = this.getAttribute('data-skill');
        if (player.spendSkillPoint(id)) {
          renderSkills();
          if (showStats) renderStats();
        }
      });
    }
  }


  // ==================== INPUT ====================
  document.addEventListener('keydown', function(e) {
    keys[e.key.toLowerCase()] = true;
    if (gameState === 'playing') {
      if (e.key.toLowerCase() === 'i') toggleInventory();
      if (e.key.toLowerCase() === 'c') toggleStats();
      if (e.key.toLowerCase() === 'k') toggleSkills();
      if (e.key.toLowerCase() === 'q') player.usePotion('hp');
      if (e.key.toLowerCase() === 'e') player.usePotion('mp');
      var num = parseInt(e.key);
      if (num >= 1 && num <= 6 && player.inventory.length >= num) {
        var it = player.inventory[num - 1];
        if (['weapon', 'armor', 'shield', 'ring', 'amulet'].indexOf(it.type) >= 0) {
          player.equip(it);
          if (showInventory) renderInventory();
        }
      }
    }
  });

  document.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; });

  canvas.addEventListener('mousemove', function(e) {
    setMouseFromClient(e.clientX, e.clientY);
  });
  canvas.addEventListener('mousedown', function(e) { mouse.down = true; e.preventDefault(); });
  canvas.addEventListener('mouseup', resetAttackInput);
  canvas.addEventListener('mouseleave', resetAttackInput);
  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length > 0) {
      primeAudio();
      setMouseFromClient(e.touches[0].clientX, e.touches[0].clientY);
      mouse.down = true;
    }
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) setMouseFromClient(e.touches[0].clientX, e.touches[0].clientY);
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', function(e) {
    if (e.touches.length === 0) resetAttackInput();
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchcancel', function(e) { resetAttackInput(); e.preventDefault(); }, { passive: false });
  document.addEventListener('mouseup', resetAttackInput);
  document.addEventListener('pointerup', resetAttackInput);
  document.addEventListener('pointercancel', resetAttackInput);
  document.addEventListener('touchend', function(e) { if (!e.touches || e.touches.length === 0) resetAttackInput(); }, { passive: true });
  document.addEventListener('touchcancel', resetAttackInput, { passive: true });
  window.addEventListener('blur', resetAttackInput);
  document.addEventListener('visibilitychange', function() { if (document.hidden) resetAttackInput(); });
  canvas.addEventListener('contextmenu', function(e) { resetAttackInput(); e.preventDefault(); });
  bindAudioUnlock();
  preventBrowserZoom();
  bindTouchControls();
  fitCanvas();
  window.addEventListener('resize', fitCanvas);
  window.addEventListener('orientationchange', function() { setTimeout(fitCanvas, 100); });


  // Class selection
  var classCards = document.querySelectorAll('.class-card');
  for (var ci = 0; ci < classCards.length; ci++) {
    (function(card) {
      card.addEventListener('click', function() {
        for (var j = 0; j < classCards.length; j++) classCards[j].classList.remove('selected');
        card.classList.add('selected');
        selectedClass = card.getAttribute('data-class');
        SFX.click();
      });
    })(classCards[ci]);
  }

  // Start button
  document.getElementById('btn-start').addEventListener('click', function() {
    primeAudio();
    SFX.click();
    setTimeout(function() { SFX.click(); }, 120);
    document.getElementById('game-title').style.display = 'none';
    gameState = 'playing';
    initLevel(1);
  });

  // Restart button
  document.getElementById('btn-restart').addEventListener('click', function() {
    location.reload();
  });

  // Sound toggle
  document.getElementById('sound-toggle').addEventListener('click', function() {
    primeAudio();
    soundEnabled = !soundEnabled;
    this.textContent = soundEnabled ? '🔊' : '🔇';
    if (soundEnabled) setTimeout(function() { SFX.click(); }, 50);
  });

  // ==================== GAME LOOP ====================
  function gameLoop(timestamp) {
    var dt = Math.min(0.05, (timestamp - lastTime) / 1000);
    lastTime = timestamp;
    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  requestAnimationFrame(function(timestamp) {
    lastTime = timestamp;
    gameLoop(timestamp);
  });
  </script>
  </body>
  </html>
