  <!DOCTYPE html>
  <html lang="zh-CN">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Diablo Web - 暗黑破坏神 HTML5</title>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    position: fixed;
    inset: 0;
    background: #000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    font-family: 'Georgia', serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  canvas {
    display: block;
    cursor: crosshair;
    image-rendering: pixelated;
    width: 960px;
    height: 640px;
    max-width: none;
    max-height: none;
    touch-action: none;
  }

  /* Title Screen */
  #game-title {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    pointer-events: all;
  }
  #game-title h1 {
    color: #8b0000;
    font-size: 64px;
    text-shadow: 0 0 30px #8b0000, 0 0 60px #ff0000;
    margin-bottom: 10px;
    letter-spacing: 12px;
  }
  #game-title .subtitle {
    color: #c9a634;
    font-size: 16px;
    margin-bottom: 40px;
  }
  #game-title .controls-hint {
    color: #666;
    font-size: 13px;
    margin-top: 30px;
    text-align: center;
    line-height: 1.8;
  }
  #btn-start {
    background: #3a1a0a;
    border: 2px solid #8b6914;
    color: #c9a634;
    padding: 14px 50px;
    font-size: 20px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all 0.3s;
    letter-spacing: 4px;
  }
  #btn-start:hover {
    background: #5a2a1a;
    border-color: #c9a634;
    text-shadow: 0 0 10px #c9a634;
    transform: scale(1.05);
  }

  /* Class Selection */
  .class-select {
    display: flex;
    gap: 20px;
    margin: 25px 0;
  }
  .class-card {
    background: rgba(30, 15, 5, 0.8);
    border: 3px solid #5a4a2a;
    padding: 20px 15px;
    cursor: pointer;
    text-align: center;
    color: #d4c484;
    transition: all 0.3s;
    width: 130px;
    border-radius: 4px;
  }
  .class-card:hover {
    border-color: #c9a634;
    background: rgba(60, 30, 15, 0.9);
    transform: translateY(-3px);
    box-shadow: 0 4px 15px rgba(201, 166, 52, 0.3);
  }
  .class-card.selected {
    border-color: #c9a634;
    background: rgba(80, 40, 15, 0.9);
    box-shadow: 0 0 20px rgba(201, 166, 52, 0.4);
  }
  .class-card .icon {
    font-size: 40px;
    margin-bottom: 8px;
  }
  .class-card .name {
    font-size: 15px;
    color: #c9a634;
    font-weight: bold;
  }
  .class-card .desc {
    font-size: 11px;
    color: #999;
    margin-top: 5px;
  }

  /* Death Screen */
  #death-screen {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(80, 0, 0, 0.8);
    z-index: 150;
    pointer-events: all;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #death-screen h1 {
    color: #ff0000;
    font-size: 56px;
    text-shadow: 0 0 40px #ff0000;
    margin-bottom: 10px;
  }
  #death-screen .death-info {
    color: #cc8888;
    font-size: 18px;
    margin-bottom: 30px;
  }
  #death-screen button {
    background: #3a1a0a;
    border: 2px solid #8b0000;
    color: #ff4444;
    padding: 14px 50px;
    font-size: 18px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all 0.3s;
  }
  #death-screen button:hover {
    background: #5a1a0a;
    border-color: #ff4444;
    text-shadow: 0 0 10px #ff4444;
  }

  /* UI Overlay */
  #ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 50;
  }
  #msg-log {
    position: absolute;
    bottom: 100px;
    left: 10px;
    pointer-events: none;
  }
  .msg-line {
    font-size: 13px;
    margin: 2px 0;
    text-shadow: 1px 1px 3px #000;
    animation: fadeMsg 4s forwards;
  }
  @keyframes fadeMsg {
    0% { opacity: 1; }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Inventory Panel */
  #inventory-panel {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20, 10, 5, 0.97);
    border: 2px solid #8b6914;
    border-radius: 6px;
    padding: 20px;
    pointer-events: all;
    min-width: 420px;
    z-index: 100;
  }
  #inventory-panel h2 {
    color: #c9a634;
    text-align: center;
    margin-bottom: 10px;
    font-size: 18px;
    text-shadow: 0 0 10px #c9a634;
  }
  .inv-grid {
    display: grid;
    grid-template-columns: repeat(6, 50px);
    gap: 4px;
    margin: 10px auto;
    width: fit-content;
  }
  .inv-slot {
    width: 50px; height: 50px;
    border: 1px solid #5a4a2a;
    background: rgba(30, 20, 10, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .inv-slot:hover { border-color: #c9a634; }
  .inv-slot.equipped {
    border-color: #4fc3f7;
    background: rgba(30, 60, 80, 0.8);
  }

  /* Stats Panel */
  #stats-panel {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20, 10, 5, 0.97);
    border: 2px solid #8b6914;
    border-radius: 6px;
    padding: 20px;
    pointer-events: all;
    min-width: 300px;
    z-index: 100;
    color: #c9a634;
  }
  #stats-panel h2 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 18px;
    text-shadow: 0 0 10px #c9a634;
  }
  .stat-line {
    margin: 5px 0;
    font-size: 14px;
    color: #d4c484;
    border-bottom: 1px solid rgba(90,74,42,0.3);
    padding-bottom: 3px;
  }
  .stat-val {
    color: #fff;
    float: right;
  }

  /* Sound toggle */
  #sound-toggle {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(30,15,5,0.8);
    border: 1px solid #5a4a2a;
    color: #c9a634;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 16px;
    font-family: 'Georgia', serif;
    pointer-events: all;
    z-index: 60;
  }
  #sound-toggle:hover { border-color: #c9a634; }

  /* Touch controls */
  #touch-controls {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 80;
    touch-action: none;
  }
  .touch-stick {
    position: absolute;
    left: 24px;
    bottom: 18px;
    width: 132px;
    height: 132px;
    border: 2px solid rgba(201,166,52,0.55);
    border-radius: 50%;
    background: rgba(20,10,5,0.42);
    pointer-events: all;
    touch-action: none;
  }
  .touch-stick::before {
    content: "";
    position: absolute;
    inset: 34px;
    border: 1px solid rgba(201,166,52,0.35);
    border-radius: 50%;
  }
  .touch-stick-knob {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 54px;
    height: 54px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #d7c073, #6e4c18);
    border: 2px solid #c9a634;
    box-shadow: 0 0 18px rgba(201,166,52,0.35);
  }
  .touch-actions {
    position: absolute;
    right: 18px;
    bottom: 16px;
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(2, 56px);
    gap: 10px;
    pointer-events: all;
    touch-action: none;
  }
  .touch-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid #8b6914;
    background: rgba(30,15,5,0.78);
    color: #f0d878;
    font: bold 20px Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 1px 3px #000;
    touch-action: none;
  }
  .touch-btn:active,
  .touch-btn.active {
    background: rgba(95,34,14,0.92);
    border-color: #f0d878;
    transform: scale(0.96);
  }
  #touch-attack {
    grid-column: 2 / 4;
    grid-row: 1 / 3;
    width: 122px;
    height: 122px;
    font-size: 34px;
    border-color: #9f2b1d;
    color: #ffd6b0;
    background: rgba(74,18,10,0.8);
  }
  @media (pointer: coarse) {
    #touch-controls { display: block; }
    #msg-log { bottom: 146px; }
    #game-title h1 { font-size: 42px; letter-spacing: 8px; }
    .class-select { gap: 10px; flex-wrap: wrap; justify-content: center; }
    .class-card { width: 104px; padding: 14px 8px; }
    #inventory-panel {
      width: min(94vw, 420px);
      min-width: 0;
      max-height: 88vh;
      overflow-y: auto;
    }
    #stats-panel {
      width: min(90vw, 300px);
      min-width: 0;
    }
  }
  </style>
  </head>
  <body>

  <!-- Title Screen -->
  <div id="game-title">
    <h1>D I A B L O</h1>
    <div class="subtitle">⚔ HTML5 Web Edition · 带音效 ⚔</div>
    <div class="class-select">
      <div class="class-card selected" data-class="warrior">
        <div class="icon">⚔️</div>
        <div class="name">战士</div>
        <div class="desc">近战 · 高生命</div>
      </div>
      <div class="class-card" data-class="rogue">
        <div class="icon">🏹</div>
        <div class="name">游侠</div>
        <div class="desc">远程 · 高敏捷</div>
      </div>
      <div class="class-card" data-class="sorcerer">
        <div class="icon">🔮</div>
        <div class="name">法师</div>
        <div class="desc">魔法 · 高法力</div>
      </div>
    </div>
    <button id="btn-start">开 始 游 戏</button>
    <div class="controls-hint">
      移动: WASD / 方向键 | 攻击: 鼠标左键<br>
      触屏: 左摇杆移动 / 右侧按钮攻击<br>
      背包: I | 属性: C | 红药: Q | 蓝药: E
    </div>
  </div>

  <!-- Death Screen -->
  <div id="death-screen">
    <h1>☠ 你已阵亡 ☠</h1>
    <div class="death-info">地下城吞噬了你的灵魂...</div>
    <button id="btn-restart">重新开始</button>
  </div>

  <!-- Canvas -->
  <canvas id="game"></canvas>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <button id="sound-toggle">🔊</button>
    <div id="msg-log"></div>
    <div id="touch-controls" aria-label="触屏控制">
      <div id="touch-stick" class="touch-stick" aria-label="移动摇杆">
        <div id="touch-stick-knob" class="touch-stick-knob"></div>
      </div>
      <div class="touch-actions">
        <button id="touch-hp" class="touch-btn" type="button" aria-label="使用生命药水">❤️</button>
        <button id="touch-attack" class="touch-btn" type="button" aria-label="攻击">⚔</button>
        <button id="touch-mp" class="touch-btn" type="button" aria-label="使用法力药水">💙</button>
        <button id="touch-inv" class="touch-btn" type="button" aria-label="打开背包">🎒</button>
        <button id="touch-stats" class="touch-btn" type="button" aria-label="打开属性">📊</button>
      </div>
    </div>
    <div id="inventory-panel">
      <h2>🎒 背包</h2>
      <div id="equipped-section">
        <h3 style="color:#4fc3f7;font-size:14px;margin-bottom:5px;">装备栏</h3>
        <div class="inv-grid" id="equip-grid" style="grid-template-columns:repeat(5,50px)"></div>
      </div>
      <div style="margin-top:12px;">
        <h3 style="color:#8b6914;font-size:14px;margin-bottom:5px;">物品栏</h3>
        <div class="inv-grid" id="bag-grid"></div>
      </div>
      <div style="text-align:center;margin-top:12px;">
        <button onclick="toggleInventory()" style="background:#3a1a0a;border:1px solid #8b6914;color:#c9a634;padding:6px
  24px;cursor:pointer;font-family:Georgia,serif;">关闭 [I]</button>
      </div>
    </div>
    <div id="stats-panel">
      <h2>📊 角色属性</h2>
      <div id="stats-content"></div>
      <div style="text-align:center;margin-top:12px;">
        <button onclick="toggleStats()" style="background:#3a1a0a;border:1px solid #8b6914;color:#c9a634;padding:6px
  24px;cursor:pointer;font-family:Georgia,serif;">关闭 [C]</button>
      </div>
    </div>
  </div>

  <script>
  // ==================== SOUND ENGINE ====================
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  let masterGain = null;
  let soundEnabled = true;
  let audioPrimed = false;
  let lastAudioError = '';
  const isTouchDevice = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  const toneCache = {};
  const activeSounds = [];
  let lastHtmlSoundAt = 0;

  function updateSoundStatus() {
    var btn = document.getElementById('sound-toggle');
    if (!btn) return;
    var state = audioCtx ? audioCtx.state : 'not-created';
    var engine = isTouchDevice ? 'HTMLAudio' : 'WebAudio';
    btn.title = '音频: ' + engine + ' / ' + state + (lastAudioError ? ' / ' + lastAudioError : '');
  }

  function initAudio() {
    if (!AudioCtx) {
      lastAudioError = 'browser-no-audio-context';
      updateSoundStatus();
      return false;
    }
    try {
      if (!audioCtx) {
        audioCtx = new AudioCtx();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.5;
        masterGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') {
        var resumePromise = audioCtx.resume();
        if (resumePromise && resumePromise.then) {
          resumePromise.then(updateSoundStatus).catch(function(err) {
            lastAudioError = err && err.name ? err.name : 'resume-failed';
            updateSoundStatus();
          });
        }
      }
      lastAudioError = '';
      updateSoundStatus();
      return true;
    } catch(e) {
      lastAudioError = e && e.name ? e.name : 'init-failed';
      updateSoundStatus();
      return false;
    }
  }

  function primeAudio() {
    if (audioPrimed || !initAudio() || !audioCtx || !masterGain) return;
    try {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 440;
      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.03);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.03);
      audioPrimed = true;
      updateSoundStatus();
    } catch(e) {
      lastAudioError = e && e.name ? e.name : 'prime-failed';
      updateSoundStatus();
    }
  }

  function bindAudioUnlock() {
    var unlock = function() { primeAudio(); };
    document.addEventListener('pointerdown', unlock, { passive: true, capture: true });
    document.addEventListener('touchstart', unlock, { passive: true, capture: true });
    document.addEventListener('click', unlock, { passive: true, capture: true });
  }

  function makeToneUrl(freq, duration, type, volume) {
    var key = [Math.round(freq), Math.round(duration * 1000), type || 'square', Math.round((volume || 0.3) * 100)].join(':');
    if (toneCache[key]) return toneCache[key];
    var sampleRate = 22050;
    var samples = Math.max(1, Math.floor(sampleRate * duration));
    var bytes = 44 + samples * 2;
    var buffer = new ArrayBuffer(bytes);
    var view = new DataView(buffer);
    function writeString(offset, str) {
      for (var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
    }
    writeString(0, 'RIFF');
    view.setUint32(4, 36 + samples * 2, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, 'data');
    view.setUint32(40, samples * 2, true);
    var amp = Math.max(0, Math.min(1, volume || 0.3)) * 24000;
    for (var s = 0; s < samples; s++) {
      var t = s / sampleRate;
      var phase = (t * freq) % 1;
      var wave;
      if (type === 'sine') wave = Math.sin(phase * Math.PI * 2);
      else if (type === 'triangle') wave = 1 - 4 * Math.abs(Math.round(phase - 0.25) - (phase - 0.25));
      else if (type === 'sawtooth') wave = phase * 2 - 1;
      else wave = phase < 0.5 ? 1 : -1;
      var fade = Math.min(1, s / 80, (samples - s) / 160);
      view.setInt16(44 + s * 2, Math.max(-32768, Math.min(32767, wave * amp * fade)), true);
    }
    var binary = '';
    var data = new Uint8Array(buffer);
    for (var b = 0; b < data.length; b++) binary += String.fromCharCode(data[b]);
    var url = 'data:audio/wav;base64,' + btoa(binary);
    toneCache[key] = url;
    return url;
  }

  function playHtmlTone(freq, duration, type, volume) {
    var now = performance.now();
    if (activeSounds.length >= 2 || now - lastHtmlSoundAt < (isTouchDevice ? 90 : 35)) return;
    lastHtmlSoundAt = now;
    try {
      var audio = new Audio(makeToneUrl(freq, Math.min(duration, isTouchDevice ? 0.07 : 0.12), type, volume));
      audio.volume = Math.max(0, Math.min(1, (volume || 0.3) * (isTouchDevice ? 1.25 : 1.7)));
      activeSounds.push(audio);
      audio.onended = audio.onerror = function() {
        var index = activeSounds.indexOf(audio);
        if (index >= 0) activeSounds.splice(index, 1);
      };
      var promise = audio.play();
      if (promise && promise.catch) {
        promise.catch(function(err) {
          lastAudioError = err && err.name ? err.name : 'html-audio-failed';
          updateSoundStatus();
          audio.onended();
        });
      }
    } catch(e) {
      lastAudioError = e && e.name ? e.name : 'html-audio-failed';
      updateSoundStatus();
    }
  }

  function playWebTone(freq, duration, type, volume, detune) {
    if (!initAudio() || !audioCtx || !masterGain) return false;
    try {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = type || 'square';
      osc.frequency.value = freq;
      if (detune) osc.detune.value = detune;
      gain.gain.setValueAtTime(volume || 0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + duration);
      updateSoundStatus();
      return true;
    } catch(e) {
      lastAudioError = e && e.name ? e.name : 'web-audio-failed';
      updateSoundStatus();
      return false;
    }
  }

  function playTone(freq, duration, type, volume, detune) {
    if (!soundEnabled) return;
    if (!isTouchDevice) playWebTone(freq, duration, type, volume, detune);
    playHtmlTone(freq + (detune || 0), duration, type, volume);
    updateSoundStatus();
  }

  function playNoise(duration, volume) {
    if (!soundEnabled) return;
    if (!isTouchDevice) {
      playWebTone(120 + Math.random() * 90, duration, 'sawtooth', volume || 0.15);
      playHtmlTone(110 + Math.random() * 140, duration, 'sawtooth', volume || 0.15);
    }
    updateSoundStatus();
  }


  const SFX = {
    meleeSwing() {
      if (isTouchDevice) { playTone(190, 0.045, 'sawtooth', 0.08); return; }
      playNoise(0.12, 0.3);
      playTone(200, 0.08, 'sawtooth', 0.15);
      playTone(150, 0.1, 'sawtooth', 0.1);
    },
    arrowShoot() {
      if (isTouchDevice) { playTone(760, 0.045, 'sine', 0.08); return; }
      playNoise(0.05, 0.15);
      playTone(800, 0.05, 'sine', 0.12);
      playTone(600, 0.08, 'sine', 0.1);
    },
    spellCast() {
      if (isTouchDevice) { playTone(520, 0.06, 'sine', 0.09); return; }
      playTone(400, 0.15, 'sine', 0.15);
      playTone(600, 0.12, 'sine', 0.12);
      playTone(800, 0.1, 'sine', 0.1);
      setTimeout(() => playTone(500, 0.2, 'triangle', 0.1), 50);
    },
    hit() {
      playNoise(0.08, 0.25);
      playTone(120, 0.1, 'square', 0.2);
    },
    enemyHit() {
      if (isTouchDevice) return;
      playNoise(0.06, 0.2);
      playTone(180, 0.08, 'square', 0.15);

    enemyDeath() {

  // ==================== DUNGEON GENERATION ====================
  class Room {
    constructor(x, y, w, h) {
      this.x = x; this.y = y; this.w = w; this.h = h;
      this.cx = Math.floor(x + w / 2);
      this.cy = Math.floor(y + h / 2);
    }
    intersects(other, pad) {
      pad = pad || 2;
      return !(this.x + this.w + pad < other.x || other.x + other.w + pad < this.x ||
               this.y + this.h + pad < other.y || other.y + other.h + pad < this.y);
    }
  }

  function generateDungeon(level) {
    const map = [];
    for (let y = 0; y < MAP_H; y++) {
      map[y] = [];
      for (let x = 0; x < MAP_W; x++) map[y][x] = WALL;
    }
    const rooms = [];
    const maxRooms = 12 + level * 2;
    const minSize = 5, maxSize = 12;

    for (let attempt = 0; attempt < maxRooms * 5; attempt++) {
      if (rooms.length >= maxRooms) break;
      const w = minSize + Math.floor(Math.random() * (maxSize - minSize));
      const h = minSize + Math.floor(Math.random() * (maxSize - minSize));
      const x = 1 + Math.floor(Math.random() * (MAP_W - w - 2));
      const y = 1 + Math.floor(Math.random() * (MAP_H - h - 2));
      const room = new Room(x, y, w, h);
      let ok = true;
      for (let i = 0; i < rooms.length; i++) {
        if (room.intersects(rooms[i])) { ok = false; break; }
      }
      if (ok) {
        rooms.push(room);
        for (let ry = y; ry < y + h; ry++)
          for (let rx = x; rx < x + w; rx++)
            map[ry][rx] = FLOOR;
      }
    }

    // Corridors
    for (let i = 1; i < rooms.length; i++) {
      const a = rooms[i - 1], b = rooms[i];
      let cx = a.cx, cy = a.cy;
      while (cx !== b.cx) { cx += (b.cx > cx) ? 1 : -1; map[cy][cx] = FLOOR; }
      while (cy !== b.cy) { cy += (b.cy > cy) ? 1 : -1; map[cy][cx] = FLOOR; }
    }

    // Doors
    for (let y = 1; y < MAP_H - 1; y++) {
      for (let x = 1; x < MAP_W - 1; x++) {
        if (map[y][x] !== FLOOR) continue;
        const h = (map[y-1][x] === WALL && map[y+1][x] === WALL && map[y][x-1] === FLOOR && map[y][x+1] === FLOOR);
        const v = (map[y][x-1] === WALL && map[y][x+1] === WALL && map[y-1][x] === FLOOR && map[y+1][x] === FLOOR);
        if ((h || v) && Math.random() < 0.3) map[y][x] = DOOR;
      }
    }

    // Stairs
    const startRoom = rooms[0], endRoom = rooms[rooms.length - 1];
    map[startRoom.cy][startRoom.cx] = STAIRS_UP;
    map[endRoom.cy][endRoom.cx] = STAIRS_DOWN;

    // Chests
    for (let i = 1; i < rooms.length - 1; i++) {
      if (Math.random() < 0.4) {
        const room = rooms[i];
        const cx = room.x + 1 + Math.floor(Math.random() * (room.w - 2));
        const cy = room.y + 1 + Math.floor(Math.random() * (room.h - 2));
        if (map[cy][cx] === FLOOR) map[cy][cx] = CHEST;
      }
    }

    return { map: map, rooms: rooms, startRoom: startRoom, endRoom: endRoom };
  }

  Player.prototype.getTotalDamage = function() {
    var d = [this.baseDamage[0], this.baseDamage[1]];
    if (this.equipped.weapon && this.equipped.weapon.damage) {
      d[0] += this.equipped.weapon.damage[0];
      d[1] += this.equipped.weapon.damage[1];
    }
    d[0] += Math.floor(this.str / 5);
    d[1] += Math.floor(this.str / 5);
    return d;
  };

  Player.prototype.getTotalArmor = function() {
    var a = this.baseArmor;
    if (this.equipped.armor) a += this.equipped.armor.armor;
    if (this.equipped.shield) a += this.equipped.shield.armor;
    return a;
  };

  Player.prototype.getAttackRange = function() {
    if (this.equipped.weapon && this.equipped.weapon.range) return this.equipped.weapon.range;
    return this.attackRange;
  };

  Player.prototype.gainExp = function(amount) {
    this.exp += amount;
    while (this.exp >= this.expNext) {
      this.exp -= this.expNext;
      this.level++;
      this.expNext = Math.floor(this.expNext * 1.5);
      this.maxHp += 10 + this.vit;
      this.maxMp += 5 + Math.floor(this.mag / 2);
      this.hp = this.maxHp;
      this.mp = this.maxMp;
      this.str += 2; this.dex += 2; this.vit += 2; this.mag += 2;
      addMessage('🎉 升级！你现在是 ' + this.level + ' 级！', '#ff0');
      spawnParticles(this.x, this.y, '#ff0', 20);
      SFX.levelUp();
    }
  };

  Player.prototype.equip = function(item) {
    if (!item) return;
    var slot = null;
    if (item.type === 'weapon') slot = 'weapon';
    else if (item.type === 'armor') slot = 'armor';
    else if (item.type === 'shield') slot = 'shield';
    else if (item.type === 'ring') slot = 'ring';
    else if (item.type === 'amulet') slot = 'amulet';
    if (!slot) return;
    var old = this.equipped[slot];
    this.equipped[slot] = item;
    this.inventory = this.inventory.filter(function(i) { return i.id !== item.id; });
    if (old) this.inventory.push(old);
    addMessage('装备了 ' + item.icon + ' ' + item.name, RARITY_COLORS[item.rarity]);
    SFX.click();
  };

    this.hp = Math.min(this.maxHp, this.hp + dt * (1 + this.vit * 0.05));

  Enemy.prototype.update = function(dt, px, py) {
    this.attackCooldown = Math.max(0, this.attackCooldown - dt);
    this.aiTimer -= dt;
    this.stunTimer = Math.max(0, this.stunTimer - dt);
    this.animTimer += dt;
    if (this.animTimer > 0.2) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }
    if (this.stunTimer > 0) return;

    var dist = Math.hypot(px - this.x, py - this.y);
    if (dist < 200) {
      this.aiState = 'chase';
      if (dist < this.attackRange) this.aiState = 'attack';
    } else {
      this.aiState = 'idle';
      if (this.aiTimer <= 0) {
        this.targetX = this.x + (Math.random() - 0.5) * 100;
        this.targetY = this.y + (Math.random() - 0.5) * 100;
        this.aiTimer = 2 + Math.random() * 3;
      }
    }

    var angle, nx, ny;
    if (this.aiState === 'chase') {
      angle = Math.atan2(py - this.y, px - this.x);
      nx = this.x + Math.cos(angle) * this.speed * dt * 60;
      ny = this.y + Math.sin(angle) * this.speed * dt * 60;
      if (canWalk(nx, this.y)) this.x = nx;
      if (canWalk(this.x, ny)) this.y = ny;
    } else if (this.aiState === 'idle') {
      angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
      nx = this.x + Math.cos(angle) * this.speed * 0.3 * dt * 60;
      ny = this.y + Math.sin(angle) * this.speed * 0.3 * dt * 60;
      if (canWalk(nx, this.y)) this.x = nx;
      if (canWalk(this.x, ny)) this.y = ny;
    }
  };

    this.stunTimer = 0.2;
    SFX.enemyHit();
    return dmg;
  };

  Enemy.prototype.tryAttack = function(p) {
    if (this.attackCooldown > 0 || this.aiState !== 'attack') return false;
    this.attackCooldown = 1 / this.attackSpeed;
    var dmg = this.damage[0] + Math.floor(Math.random() * (this.damage[1] - this.damage[0]));
    p.takeDamage(dmg);
    return true;
  };

      var goldItem = { id: Math.random().toString(36).substr(2, 9), name: '黄金', icon: '💰', type: 'gold', value: g,
  rarity: 0 };
      items.push({ x: this.x + (Math.random() - 0.5) * 20, y: this.y + (Math.random() - 0.5) * 20, item: goldItem });
    }
    if (Math.random() < this.dropChance) {
      items.push({ x: this.x + (Math.random() - 0.5) * 20, y: this.y + (Math.random() - 0.5) * 20, item:
  generateItem(this.level) });
    }
    if (Math.random() < 0.3) {
      var pot = Math.random() < 0.6 ? genHPot(this.level) : genMPot(this.level);
      items.push({ x: this.x + (Math.random() - 0.5) * 20, y: this.y + (Math.random() - 0.5) * 20, item: pot });
    }
  };

  // ==================== PROJECTILE ====================
  function Projectile(x, y, angle, speed, damage, owner, color) {
    this.x = x; this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.damage = damage;
    this.owner = owner;
    this.color = color || '#ff0';
    this.life = 3;
    this.pierce = false;
  }

  Projectile.prototype.update = function(dt) {
    this.x += this.vx * dt * 60;
    this.y += this.vy * dt * 60;
    this.life -= dt;
    return this.life > 0 && canWalk(this.x, this.y);
  };

  // ==================== HELPERS ====================
  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4 - 2,
        life: 0.5 + Math.random() * 0.5,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function spawnFloatingText(x, y, text, color) {
    floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1.5, vy: -1 });
  }

  function canWalk(wx, wy) {
    var tx = Math.floor(wx / TILE), ty = Math.floor(wy / TILE);
    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
    return dungeon.map[ty][tx] !== WALL;
  }

  function getTile(tx, ty) {
    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return WALL;
    return dungeon.map[ty][tx];
  }

  function computeFOV() {
    lightMap = [];
    for (var y = 0; y < MAP_H; y++) {
      lightMap[y] = [];
      for (var x = 0; x < MAP_W; x++) lightMap[y][x] = 0;
    }
    var px = Math.floor(player.x / TILE), py = Math.floor(player.y / TILE);
    var R = player.lightRadius;
    for (var dy = -R; dy <= R; dy++) {
      for (var dx = -R; dx <= R; dx++) {
        var tx = px + dx, ty = py + dy;
        if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) continue;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > R) continue;
        var blocked = false;
        var steps = Math.ceil(dist);
        for (var s = 1; s < steps; s++) {
          var t = s / steps;
          var rx = Math.floor(px + dx * t), ry = Math.floor(py + dy * t);
          if (dungeon.map[ry] && dungeon.map[ry][rx] === WALL) { blocked = true; break; }
        }
        if (!blocked) {
          lightMap[ty][tx] = Math.max(lightMap[ty][tx], 1 - dist / (R + 1));
          revealed[ty][tx] = true;
        }
      }
    }
  }

  function addMessage(text, color) {
    messages.push({ text: text, color: color, time: gameTime });
    var log = document.getElementById('msg-log');
    var div = document.createElement('div');
    div.className = 'msg-line';
    div.style.color = color || '#fff';
    div.textContent = text;
    log.appendChild(div);
    setTimeout(function() { if (div.parentNode) div.remove(); }, 4000);
    while (log.children.length > 8) log.children[0].remove();
  }

  // ==================== SPAWN ====================
  function spawnEnemies() {
    enemies = [];
    var types = ['zombie', 'skeleton', 'demon', 'ghost'];
    var count = 8 + currentLevel * 4;
    for (var i = 0; i < count; i++) {
      var room = dungeon.rooms[1 + Math.floor(Math.random() * (dungeon.rooms.length - 1))];
      var ex = (room.x + 1 + Math.floor(Math.random() * (room.w - 2))) * TILE + TILE / 2;
      var ey = (room.y + 1 + Math.floor(Math.random() * (room.h - 2))) * TILE + TILE / 2;
      enemies.push(new Enemy(types[Math.floor(Math.random() * types.length)], ex, ey, currentLevel));
    }
    if (currentLevel % 3 === 0) {
      var bossRoom = dungeon.endRoom;
      enemies.push(new Enemy('boss', bossRoom.cx * TILE + TILE / 2, bossRoom.cy * TILE + TILE / 2, currentLevel));
      addMessage('⚠️ 你感受到了强大的邪恶力量...', '#f44');
    }
  }

  function initLevel(level) {
    currentLevel = level;
    dungeon = generateDungeon(level);
    revealed = [];
    for (var y = 0; y < MAP_H; y++) {
      revealed[y] = [];
      for (var x = 0; x < MAP_W; x++) revealed[y][x] = false;
    }
    var sx = dungeon.startRoom.cx * TILE + TILE / 2;
    var sy = dungeon.startRoom.cy * TILE + TILE / 2;
    if (!player) {
      player = new Player(selectedClass, sx, sy);
    } else {
      player.x = sx; player.y = sy;
    }
    projectiles = []; items = []; particles = []; floatingTexts = [];
    spawnEnemies();
    addMessage('🏰 进入地下城第 ' + level + ' 层', '#c9a634');
    SFX.stairs();
    fitCanvas();
  }


  function getTouchAttackTarget() {
    if (!player) return { x: camera.x + CANVAS_W / 2, y: camera.y + CANVAS_H / 2 };
    var best = null;
    var bestDist = Infinity;
    var maxDist = Math.max(player.getAttackRange(), 220);
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      var dist = Math.hypot(e.x - player.x, e.y - player.y);
      var tx = Math.floor(e.x / TILE), ty = Math.floor(e.y / TILE);
      var visible = lightMap[ty] && lightMap[ty][tx] > 0.1;
      if (visible && dist < maxDist && dist < bestDist) {
        best = e;
        bestDist = dist;
      }
    }
    if (best) return { x: best.x, y: best.y };
    var dirs = [
      { x: 0, y: 1 },
      { x: -1, y: 0 },
      { x: 0, y: -1 },
      { x: 1, y: 0 }
    ];
    var dir = dirs[player.facing] || dirs[0];
    return { x: player.x + dir.x * 160, y: player.y + dir.y * 160 };
  }

  function setMouseFromClient(clientX, clientY) {
    var r = canvas.getBoundingClientRect();
    mouse.x = (clientX - r.left) * (CANVAS_W / r.width);
    mouse.y = (clientY - r.top) * (CANVAS_H / r.height);
  }

  function preventBrowserZoom() {
    var lastTouchEnd = 0;
    document.addEventListener('touchmove', function(e) {
      if (e.touches && e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchend', function(e) {
      var now = Date.now();
      if (now - lastTouchEnd <= 320) e.preventDefault();
      lastTouchEnd = now;
    }, { passive: false });
    document.addEventListener('dblclick', function(e) { e.preventDefault(); }, { passive: false });
    ['gesturestart', 'gesturechange', 'gestureend'].forEach(function(type) {
      document.addEventListener(type, function(e) { e.preventDefault(); }, { passive: false });
    });
  }

  function bindTouchControls() {
    var stick = document.getElementById('touch-stick');
    var knob = document.getElementById('touch-stick-knob');
    var attackBtn = document.getElementById('touch-attack');
    if (!stick || !knob || !attackBtn) return;

    var stickPointerId = null;
    function updateStick(e) {
      var r = stick.getBoundingClientRect();
      var cx = r.left + r.width / 2;
      var cy = r.top + r.height / 2;
      var x = e.clientX - cx;
      var y = e.clientY - cy;
      var max = r.width * 0.36;
      var dist = Math.hypot(x, y);
      if (dist > max) {
        x = x / dist * max;
        y = y / dist * max;
        dist = max;
      }
      touchMove.x = Math.abs(x) < 6 ? 0 : x / max;
      touchMove.y = Math.abs(y) < 6 ? 0 : y / max;
      knob.style.transform = 'translate(-50%, -50%) translate(' + x + 'px, ' + y + 'px)';
    }
    function resetStick() {
      stickPointerId = null;
      touchMove.x = 0;
      touchMove.y = 0;
      knob.style.transform = 'translate(-50%, -50%)';
    }

    stick.addEventListener('pointerdown', function(e) {
      if (stickPointerId !== null) return;
      primeAudio();
      stickPointerId = e.pointerId;
      stick.setPointerCapture(e.pointerId);
      updateStick(e);
      e.preventDefault();
    });
    stick.addEventListener('pointermove', function(e) {
      if (e.pointerId !== stickPointerId) return;
      updateStick(e);
      e.preventDefault();
    });
    ['pointerup', 'pointercancel', 'lostpointercapture'].forEach(function(type) {
      stick.addEventListener(type, function(e) {
        if (type === 'lostpointercapture' || e.pointerId === stickPointerId) resetStick();
      });
    });

    attackBtn.addEventListener('pointerdown', function(e) {
      primeAudio();
      touchAttack = true;
      attackBtn.classList.add('active');
      attackBtn.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    ['pointerup', 'pointercancel', 'lostpointercapture'].forEach(function(type) {
      attackBtn.addEventListener(type, function() {
        touchAttack = false;
        attackBtn.classList.remove('active');
      });
    });

    function tapButton(id, fn) {
      var btn = document.getElementById(id);
      if (!btn) return;
      btn.addEventListener('pointerdown', function(e) {
        primeAudio();
        if (gameState === 'playing') fn();
        e.preventDefault();
      });
    }
    tapButton('touch-hp', function() { player.usePotion('hp'); });
    tapButton('touch-mp', function() { player.usePotion('mp'); });
    tapButton('touch-inv', toggleInventory);
    tapButton('touch-stats', toggleStats);
  }

  // ==================== UPDATE ====================
  function update(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;
    player.update(dt);

    // Ambient
    ambientTimer -= dt;
    if (!isTouchDevice && ambientTimer <= 0) { SFX.ambient(); ambientTimer = 3 + Math.random() * 4; }

    // Movement
    var dx = 0, dy = 0;
    if (keys['w'] || keys['arrowup'])    dy -= 1;
    if (keys['s'] || keys['arrowdown'])  dy += 1;
    if (keys['a'] || keys['arrowleft'])  dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;
    dx += touchMove.x;
    dy += touchMove.y;
    player.moving = (dx !== 0 || dy !== 0);
    if (player.moving) {
      var len = Math.sqrt(dx * dx + dy * dy);
      dx /= len; dy /= len;
      var nx = player.x + dx * player.moveSpeed * dt * 60;
      var ny = player.y + dy * player.moveSpeed * dt * 60;
      if (canWalk(nx, player.y)) player.x = nx;
      if (canWalk(player.x, ny)) player.y = ny;
      if (Math.abs(dx) > Math.abs(dy)) player.facing = dx > 0 ? 3 : 1;
      else player.facing = dy > 0 ? 0 : 2;
    }

    // Attack
    if (touchAttack) {
      var aim = getTouchAttackTarget();
      mouse.x = aim.x - camera.x;
      mouse.y = aim.y - camera.y;
    }
    var attackPressed = mouse.down || touchAttack;
    if (attackPressed && player.attackCooldown <= 0) {
      var wmx = mouse.x + camera.x, wmy = mouse.y + camera.y;
      var angle = Math.atan2(wmy - player.y, wmx - player.x);
      var range = player.getAttackRange();
      if (range <= 50) {
        player.attackCooldown = 1 / player.attackSpeed;
        var dmg = player.getTotalDamage();
        var attackDmg = dmg[0] + Math.floor(Math.random() * (dmg[1] - dmg[0]));
        SFX.meleeSwing();
        for (var ei = 0; ei < enemies.length; ei++) {
          var e = enemies[ei];
          var dist = Math.hypot(e.x - player.x, e.y - player.y);
          if (dist < range) {
            var ea = Math.atan2(e.y - player.y, e.x - player.x);
            var ad = Math.abs(angle - ea);
            if (ad < Math.PI / 2 || ad > Math.PI * 1.5) e.takeDamage(attackDmg);
          }
        }
        spawnParticles(player.x + Math.cos(angle) * 20, player.y + Math.sin(angle) * 20, '#ff0', 3);
      } else {
        player.attackCooldown = 1 / player.attackSpeed;
        var dmg2 = player.getTotalDamage();
        var projDmg = dmg2[0] + Math.floor(Math.random() * (dmg2[1] - dmg2[0]));
        projectiles.push(new Projectile(player.x, player.y, angle, 8, projDmg, 'player', '#ff0'));
        if (player.className === 'sorcerer') SFX.spellCast(); else SFX.arrowShoot();
      }
    }

    // Projectiles
    var newProjectiles = [];
    for (var pi = 0; pi < projectiles.length; pi++) {
      var p = projectiles[pi];
      var alive = p.update(dt);
      if (alive) {
        if (p.owner === 'player') {
          var hit = false;
          for (var pei = 0; pei < enemies.length; pei++) {
            if (Math.hypot(enemies[pei].x - p.x, enemies[pei].y - p.y) < 20) {
              enemies[pei].takeDamage(p.damage);
              hit = true; break;
            }
          }
          if (hit) continue;
        }
        if (p.owner === 'enemy') {
          if (Math.hypot(player.x - p.x, player.y - p.y) < 16) {
            player.takeDamage(p.damage);
            continue;
          }
        }
        newProjectiles.push(p);
      }
    }
    projectiles = newProjectiles;

    // Enemies
    for (var ui = 0; ui < enemies.length; ui++) {
      enemies[ui].update(dt, player.x, player.y);
      enemies[ui].tryAttack(player);
    }
    var newEnemies = [];
    for (var dei = 0; dei < enemies.length; dei++) {
      if (enemies[dei].hp <= 0) {
        player.gainExp(enemies[dei].exp);
        enemies[dei].dropLoot();
        spawnParticles(enemies[dei].x, enemies[dei].y, '#f00', 15);
        addMessage('💀 击杀了 ' + enemies[dei].name, '#f88');
        SFX.enemyDeath();
      } else {
        newEnemies.push(enemies[dei]);
      }
    }
    enemies = newEnemies;

    // Pickup items
    var newItems = [];
    for (var ii = 0; ii < items.length; ii++) {
      var drop = items[ii];
      var dist2 = Math.hypot(drop.x - player.x, drop.y - player.y);
      if (dist2 < 30) {
        var item = drop.item;
        if (item.type === 'gold') {
          player.gold += item.value;
          addMessage('拾取 ' + item.value + ' 金币', '#c9a634');
          spawnFloatingText(drop.x, drop.y, '+' + item.value + '💰', '#c9a634');
          SFX.pickupGold();
        } else if (item.type === 'potion') {
          if (item.subtype === 'health') { player.potionHp++; addMessage('拾取 ' + item.icon + ' ' + item.name, '#4f4');
  }
          else { player.potionMp++; addMessage('拾取 ' + item.icon + ' ' + item.name, '#44f'); }
          SFX.pickupPotion();
        } else {
          if (player.inventory.length < 24) {
            player.inventory.push(item);
            addMessage('拾取 ' + item.icon + ' ' + item.name, RARITY_COLORS[item.rarity]);
            SFX.pickupItem();
          } else {
            addMessage('背包已满！', '#f44');
            newItems.push(drop);
          }
        }
      } else {
        newItems.push(drop);
      }
    }
    items = newItems;

    // Stairs & Chests
    var ptx = Math.floor(player.x / TILE), pty = Math.floor(player.y / TILE);
    if (getTile(ptx, pty) === STAIRS_DOWN) initLevel(currentLevel + 1);
    if (getTile(ptx, pty) === CHEST) {
      dungeon.map[pty][ptx] = FLOOR;
      var chestItem = generateItem(currentLevel);
      player.inventory.push(chestItem);
      addMessage('🎁 打开宝箱获得 ' + chestItem.icon + ' ' + chestItem.name, RARITY_COLORS[chestItem.rarity]);
      spawnParticles(ptx * TILE + TILE / 2, pty * TILE + TILE / 2, '#c9a634', 15);
      var chestGold = 10 + Math.floor(Math.random() * 20 * currentLevel);
      player.gold += chestGold;
      addMessage('获得 ' + chestGold + ' 金币', '#c9a634');
      SFX.openChest();
    }

    // Particles
    var newParticles = [];
    for (var k = 0; k < particles.length; k++) {
      var pp = particles[k];
      pp.x += pp.vx; pp.y += pp.vy; pp.vy += 0.1; pp.life -= dt;
      if (pp.life > 0) newParticles.push(pp);
    }
    particles = newParticles;

    var newFT = [];
    for (var fi = 0; fi < floatingTexts.length; fi++) {
      var ft = floatingTexts[fi];
      ft.y += ft.vy; ft.life -= dt;
      if (ft.life > 0) newFT.push(ft);
    }
    floatingTexts = newFT;

    camera.x = player.x - CANVAS_W / 2;
    camera.y = player.y - CANVAS_H / 2;
    computeFOV();
  }

  // ==================== RENDER ====================
  function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    if (gameState === 'title') return;

    var stx = Math.max(0, Math.floor(camera.x / TILE));
    var sty = Math.max(0, Math.floor(camera.y / TILE));
    var etx = Math.min(MAP_W, Math.ceil((camera.x + CANVAS_W) / TILE) + 1);
    var ety = Math.min(MAP_H, Math.ceil((camera.y + CANVAS_H) / TILE) + 1);

    // Tiles
    for (var ty = sty; ty < ety; ty++) {
      for (var tx = stx; tx < etx; tx++) {
        if (!revealed[ty] || !revealed[ty][tx]) continue;
        var light = lightMap[ty][tx];
        if (light <= 0.05) continue;
        var sx = tx * TILE - camera.x, sy = ty * TILE - camera.y;
        ctx.globalAlpha = Math.min(1, light + 0.1);
        var tile = dungeon.map[ty][tx];
        if (tile === WALL) {
          ctx.fillStyle = '#0f0f1e'; ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = '#2a2a3e'; ctx.fillRect(sx, sy, TILE, TILE * 0.4);
          ctx.fillStyle = '#35354a'; ctx.fillRect(sx + 2, sy + 2, TILE - 4, 2);
        } else if (tile === FLOOR) {
          ctx.fillStyle = '#2d2d1e'; ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = '#3a3a28'; ctx.fillRect(sx, sy, 1, TILE); ctx.fillRect(sx, sy, TILE, 1);
          if ((tx + ty) % 7 === 0) { ctx.fillStyle = '#3d3d25'; ctx.fillRect(sx + 8, sy + 8, 4, 4); }
        } else if (tile === DOOR) {
          ctx.fillStyle = '#2d2d1e'; ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = '#6b4c2a'; ctx.fillRect(sx + 4, sy + 2, TILE - 8, TILE - 4);
          ctx.fillStyle = '#8b6c3a'; ctx.fillRect(sx + TILE / 2 - 2, sy + TILE / 2 - 2, 4, 4);
        } else if (tile === STAIRS_DOWN) {
          ctx.fillStyle = '#2d2d1e'; ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = '#4a3a6e'; ctx.fillRect(sx + 4, sy + 4, TILE - 8, TILE - 8);
          ctx.fillStyle = '#6a5a8e';
          for (var si = 0; si < 3; si++) ctx.fillRect(sx + 8, sy + 6 + si * 7, TILE - 16, 3);
          ctx.fillStyle = 'rgba(100,80,160,' + (0.3 + Math.sin(gameTime * 3) * 0.2) + ')';
          ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
        } else if (tile === STAIRS_UP) {
          ctx.fillStyle = '#2d2d1e'; ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = '#3a6e4a'; ctx.fillRect(sx + 4, sy + 4, TILE - 8, TILE - 8);
          ctx.fillStyle = '#5a8e6a';
          for (var si2 = 0; si2 < 3; si2++) ctx.fillRect(sx + 8, sy + 6 + si2 * 7, TILE - 16, 3);
        } else if (tile === CHEST) {
          ctx.fillStyle = '#2d2d1e'; ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = '#8b7a2a'; ctx.fillRect(sx + 6, sy + 8, TILE - 12, TILE - 14);
          ctx.fillStyle = '#c9a634'; ctx.fillRect(sx + TILE / 2 - 3, sy + TILE / 2 - 2, 6, 4);
          ctx.fillStyle = '#6b5a1a'; ctx.fillRect(sx + 6, sy + TILE / 2 - 1, TILE - 12, 2);
        }
      }
    }
    ctx.globalAlpha = 1;

    // Items
    for (var di = 0; di < items.length; di++) {
      var drop = items[di];
      var dsx = drop.x - camera.x, dsy = drop.y - camera.y;
      var dtx = Math.floor(drop.x / TILE), dty = Math.floor(drop.y / TILE);
      if (!lightMap[dty] || lightMap[dty][dtx] < 0.1) continue;
      ctx.globalAlpha = 0.8 + Math.sin(gameTime * 4) * 0.2;
      ctx.font = '20px serif'; ctx.textAlign = 'center';
      ctx.fillText(drop.item.icon, dsx, dsy + 6);
      ctx.globalAlpha = 1;
    }

    // Enemies
    for (var ei = 0; ei < enemies.length; ei++) {
      var e = enemies[ei];
      var esx = e.x - camera.x, esy = e.y - camera.y;
      var etx2 = Math.floor(e.x / TILE), ety2 = Math.floor(e.y / TILE);
      if (!lightMap[ety2] || lightMap[ety2][etx2] < 0.1) continue;
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(esx, esy + 12, 12, 6, 0, 0, Math.PI * 2); ctx.fill();
      var bob = (e.aiState === 'chase' || e.aiState === 'attack') ? Math.sin(gameTime * 8) * 2 : 0;
      if (e.stunTimer > 0) ctx.globalAlpha = 0.5;
      ctx.font = '28px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(e.icon, esx, esy + bob - 4);
      ctx.globalAlpha = 1;
      if (e.hp < e.maxHp) {
        var bw = 30, ratio = e.hp / e.maxHp;
        ctx.fillStyle = '#333'; ctx.fillRect(esx - bw / 2, esy - 20, bw, 4);
        ctx.fillStyle = ratio > 0.5 ? '#4a4' : ratio > 0.25 ? '#aa4' : '#a44';
        ctx.fillRect(esx - bw / 2, esy - 20, bw * ratio, 4);
      }
      ctx.font = '10px Georgia'; ctx.fillStyle = '#f88'; ctx.textAlign = 'center';
      ctx.fillText(e.name, esx, esy - 24);
    }

    // Player
    if (player) {
      var psx = player.x - camera.x, psy = player.y - camera.y;
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(psx, psy + 14, 14, 7, 0, 0, Math.PI * 2); ctx.fill();
      if (player.invulnTimer > 0 && Math.sin(gameTime * 30) > 0) ctx.globalAlpha = 0.5;
      var pbob = player.moving ? Math.sin(gameTime * 10) * 3 : 0;
      var pIcon = { warrior: '⚔️', rogue: '🏹', sorcerer: '🔮' }[player.className];
      ctx.font = '32px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(pIcon, psx, psy + pbob - 6);
      ctx.globalAlpha = 1;
    }

    // Projectiles
    for (var pj = 0; pj < projectiles.length; pj++) {
      var proj = projectiles[pj];
      var pjsx = proj.x - camera.x, pjsy = proj.y - camera.y;
      ctx.fillStyle = proj.color;
      ctx.beginPath(); ctx.arc(pjsx, pjsy, 4, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.arc(pjsx - proj.vx * 2, pjsy - proj.vy * 2, 3, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Particles
    for (var pk = 0; pk < particles.length; pk++) {
      var part = particles[pk];
      var prsx = part.x - camera.x, prsy = part.y - camera.y;
      ctx.globalAlpha = part.life;
      ctx.fillStyle = part.color;
      ctx.fillRect(prsx - part.size / 2, prsy - part.size / 2, part.size, part.size);
    }
    ctx.globalAlpha = 1;

    // Floating texts
    for (var ft = 0; ft < floatingTexts.length; ft++) {
      var f = floatingTexts[ft];
      var fsx = f.x - camera.x, fsy = f.y - camera.y;
      ctx.globalAlpha = Math.min(1, f.life);
      ctx.font = 'bold 14px Georgia'; ctx.fillStyle = f.color; ctx.textAlign = 'center';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
      ctx.strokeText(f.text, fsx, fsy);
      ctx.fillText(f.text, fsx, fsy);
    }
    ctx.globalAlpha = 1;

    // Fog of war
    for (var fy = sty; fy < ety; fy++) {
      for (var fx = stx; fx < etx; fx++) {
        if (!revealed[fy] || !revealed[fy][fx]) {
          ctx.fillStyle = '#000';
          ctx.fillRect(fx * TILE - camera.x, fy * TILE - camera.y, TILE, TILE);
        } else if (lightMap[fy][fx] < 0.05) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(fx * TILE - camera.x, fy * TILE - camera.y, TILE, TILE);
        }
      }
    }

    drawHUD();
    drawMinimap();
  }

  function drawGlobe(cx, cy, r, ratio, dark, light, border) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#111'; ctx.fill();
    ctx.strokeStyle = border; ctx.lineWidth = 2; ctx.stroke();
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, r - 2, 0, Math.PI * 2); ctx.clip();
    var fh = r * 2 * ratio;
    var gr = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
    gr.addColorStop(0, light); gr.addColorStop(1, dark);
    ctx.fillStyle = gr;
    ctx.fillRect(cx - r, cy + r - fh, r * 2, fh);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.ellipse(cx - 5, cy - 8, 8, 12, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawHUD() {
    if (!player) return;
    var hy = CANVAS_H - 80;
    ctx.fillStyle = 'rgba(20,10,5,0.85)';
    ctx.fillRect(0, hy, CANVAS_W, 80);
    ctx.strokeStyle = '#8b6914'; ctx.lineWidth = 2;
    ctx.strokeRect(0, hy, CANVAS_W, 80);

    // Health globe
    drawGlobe(70, hy + 40, 30, player.hp / player.maxHp, '#8b0000', '#ff2222', '#cc0000');
    ctx.font = 'bold 12px Georgia'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.fillText(Math.ceil(player.hp) + '/' + player.maxHp, 70, hy + 44);

    // Mana globe
    drawGlobe(CANVAS_W - 70, hy + 40, 30, player.mp / player.maxMp, '#00008b', '#2222ff', '#0000cc');
    ctx.fillStyle = '#fff';
    ctx.fillText(Math.ceil(player.mp) + '/' + player.maxMp, CANVAS_W - 70, hy + 44);

    // EXP bar
    var ebw = CANVAS_W - 240, ebx = 120, eby = hy + 58;
    ctx.fillStyle = '#222'; ctx.fillRect(ebx, eby, ebw, 12);
    ctx.fillStyle = '#c9a634'; ctx.fillRect(ebx, eby, ebw * (player.exp / player.expNext), 12);
    ctx.strokeStyle = '#5a4a2a'; ctx.lineWidth = 1; ctx.strokeRect(ebx, eby, ebw, 12);
    ctx.fillStyle = '#fff'; ctx.font = '10px Georgia'; ctx.textAlign = 'center';
    ctx.fillText('Lv.' + player.level + '  EXP: ' + player.exp + '/' + player.expNext, CANVAS_W / 2, eby + 10);

    // Potions
    var py2 = hy + 20;
    ctx.font = '20px serif'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(139,0,0,0.5)'; ctx.fillRect(CANVAS_W / 2 - 60, py2 - 8, 40, 28);
    ctx.strokeStyle = '#8b0000'; ctx.strokeRect(CANVAS_W / 2 - 60, py2 - 8, 40, 28);
    ctx.fillText('❤️', CANVAS_W / 2 - 40, py2 + 8);
    ctx.fillStyle = '#fff'; ctx.font = '12px Georgia';
    ctx.fillText('x' + player.potionHp, CANVAS_W / 2 - 40, py2 + 24);

    ctx.font = '20px serif';
    ctx.fillStyle = 'rgba(0,0,139,0.5)'; ctx.fillRect(CANVAS_W / 2 + 20, py2 - 8, 40, 28);
    ctx.strokeStyle = '#00008b'; ctx.strokeRect(CANVAS_W / 2 + 20, py2 - 8, 40, 28);
    ctx.fillText('💙', CANVAS_W / 2 + 40, py2 + 8);
    ctx.fillStyle = '#fff'; ctx.font = '12px Georgia';
    ctx.fillText('x' + player.potionMp, CANVAS_W / 2 + 40, py2 + 24);

    ctx.fillStyle = '#888'; ctx.font = '9px Georgia';
    ctx.fillText('[Q]', CANVAS_W / 2 - 40, py2 + 36);
    ctx.fillText('[E]', CANVAS_W / 2 + 40, py2 + 36);

    // Gold
    ctx.font = '14px Georgia'; ctx.fillStyle = '#c9a634'; ctx.textAlign = 'left';
    ctx.fillText('💰 ' + player.gold, CANVAS_W / 2 - 90, hy + 18);

    // Level info
    ctx.textAlign = 'right'; ctx.fillStyle = '#888';
    ctx.fillText('地下城 Lv.' + currentLevel, CANVAS_W - 120, hy + 18);

    // Controls
    ctx.textAlign = 'center'; ctx.font = '10px Georgia'; ctx.fillStyle = '#666';
    ctx.fillText('[I]背包 [C]属性 [Q]红药 [E]蓝药', CANVAS_W / 2, hy - 4);
  }

  function drawMinimap() {
    var mw = MAP_W * MINIMAP_SCALE, mh = MAP_H * MINIMAP_SCALE;
    var mx = CANVAS_W - mw - 10, my = 10;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(mx - 1, my - 1, mw + 2, mh + 2);
    for (var mty = 0; mty < MAP_H; mty++) {
      for (var mtx = 0; mtx < MAP_W; mtx++) {
        if (!revealed[mty] || !revealed[mty][mtx]) continue;
        var mt = dungeon.map[mty][mtx];
        var mpx = mx + mtx * MINIMAP_SCALE, mpy = my + mty * MINIMAP_SCALE;
        if (mt === WALL) ctx.fillStyle = '#333';
        else if (mt === FLOOR) ctx.fillStyle = '#555';
        else if (mt === DOOR) ctx.fillStyle = '#654';
        else if (mt === STAIRS_DOWN) ctx.fillStyle = '#64a';
        else if (mt === STAIRS_UP) ctx.fillStyle = '#4a6';
        else if (mt === CHEST) ctx.fillStyle = '#a84';
        ctx.fillRect(mpx, mpy, MINIMAP_SCALE, MINIMAP_SCALE);
      }
    }
    for (var mei = 0; mei < enemies.length; mei++) {
      var metx = Math.floor(enemies[mei].x / TILE), mety = Math.floor(enemies[mei].y / TILE);
      if (lightMap[mety] && lightMap[mety][metx] > 0.1) {
        ctx.fillStyle = '#f00';
        ctx.fillRect(mx + metx * MINIMAP_SCALE, my + mety * MINIMAP_SCALE, MINIMAP_SCALE, MINIMAP_SCALE);
      }
    }
    var mptx = Math.floor(player.x / TILE), mpty = Math.floor(player.y / TILE);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(mx + mptx * MINIMAP_SCALE - 1, my + mpty * MINIMAP_SCALE - 1, MINIMAP_SCALE + 2, MINIMAP_SCALE + 2);
    ctx.strokeStyle = '#8b6914'; ctx.lineWidth = 1;
    ctx.strokeRect(mx - 1, my - 1, mw + 2, mh + 2);
  }

  // ==================== INVENTORY UI ====================
  function toggleInventory() {
    showInventory = !showInventory;
    document.getElementById('inventory-panel').style.display = showInventory ? 'block' : 'none';
    if (showInventory) renderInventory();
    if (showStats) { showStats = false; document.getElementById('stats-panel').style.display = 'none'; }
  }

  function renderInventory() {
    if (!player) return;
    var eg = document.getElementById('equip-grid');
    eg.innerHTML = '';
    var slots = ['weapon', 'armor', 'shield', 'ring', 'amulet'];
    var slotNames = { weapon: '武器', armor: '护甲', shield: '盾牌', ring: '戒指', amulet: '项链' };
    for (var si = 0; si < slots.length; si++) {
      var s = slots[si];
      var d = document.createElement('div');
      d.className = 'inv-slot equipped';
      var it = player.equipped[s];
      if (it) {
        d.innerHTML = it.icon;
        d.title = it.name + ' (' + RARITY_NAMES[it.rarity] + ')';
        d.style.color = RARITY_COLORS[it.rarity];
        (function(item, slotName) {
          d.onclick = function() {
            player.inventory.push(item);
            player.equipped[slotName] = null;
            renderInventory();
          };
        })(it, s);
      } else {
        d.innerHTML = '<span style="color:#555;font-size:10px">' + slotNames[s] + '</span>';
      }
      eg.appendChild(d);
    }
    var bg = document.getElementById('bag-grid');
    bg.innerHTML = '';
    for (var bi = 0; bi < 24; bi++) {
      var bd = document.createElement('div');
      bd.className = 'inv-slot';
      if (bi < player.inventory.length) {
        var bit = player.inventory[bi];
        bd.innerHTML = bit.icon;
        bd.title = bit.name + ' (' + RARITY_NAMES[bit.rarity] + ')';
        bd.style.color = RARITY_COLORS[bit.rarity];
        (function(item, index) {
          bd.onclick = function() {
            if (item.type === 'potion') {
              if (item.subtype === 'health') player.potionHp++; else player.potionMp++;
              player.inventory.splice(index, 1);
              addMessage('使用了 ' + item.icon + ' ' + item.name, '#aaa');
            } else if (['weapon', 'armor', 'shield', 'ring', 'amulet'].indexOf(item.type) >= 0) {
              player.equip(item);
            }
            renderInventory();
          };
        })(bit, bi);
      }
      bg.appendChild(bd);
    }
  }

  function toggleStats() {
    showStats = !showStats;
    document.getElementById('stats-panel').style.display = showStats ? 'block' : 'none';
    if (showStats) renderStats();
    if (showInventory) { showInventory = false; document.getElementById('inventory-panel').style.display = 'none'; }
  }

  function renderStats() {
    if (!player) return;
    var c = document.getElementById('stats-content');
    var d = player.getTotalDamage();
    c.innerHTML =
      '<div class="stat-line">等级 <span class="stat-val">' + player.level + '</span></div>' +
      '<div class="stat-line">职业 <span class="stat-val">' + CLASSES[player.className].name + '</span></div>' +
      '<div class="stat-line">生命 <span class="stat-val">' + Math.ceil(player.hp) + ' / ' + player.maxHp +
  '</span></div>' +
      '<div class="stat-line">法力 <span class="stat-val">' + Math.ceil(player.mp) + ' / ' + player.maxMp +
  '</span></div>' +
      '<div class="stat-line">攻击 <span class="stat-val">' + d[0] + ' - ' + d[1] + '</span></div>' +
      '<div class="stat-line">护甲 <span class="stat-val">' + player.getTotalArmor() + '</span></div>' +
      '<div class="stat-line">力量 <span class="stat-val">' + player.str + '</span></div>' +
      '<div class="stat-line">敏捷 <span class="stat-val">' + player.dex + '</span></div>' +
      '<div class="stat-line">体力 <span class="stat-val">' + player.vit + '</span></div>' +
      '<div class="stat-line">魔力 <span class="stat-val">' + player.mag + '</span></div>' +
      '<div class="stat-line">攻击范围 <span class="stat-val">' + player.getAttackRange() + '</span></div>' +
      '<div class="stat-line">攻击速度 <span class="stat-val">' + player.attackSpeed.toFixed(1) + '/s</span></div>' +
      '<div class="stat-line">金币 <span class="stat-val" style="color:#c9a634">' + player.gold + '</span></div>';
  }

  // ==================== INPUT ====================
  document.addEventListener('keydown', function(e) {
    keys[e.key.toLowerCase()] = true;
    if (gameState === 'playing') {
      if (e.key.toLowerCase() === 'i') toggleInventory();
      if (e.key.toLowerCase() === 'c') toggleStats();
      if (e.key.toLowerCase() === 'q') player.usePotion('hp');
      if (e.key.toLowerCase() === 'e') player.usePotion('mp');
      var num = parseInt(e.key);
      if (num >= 1 && num <= 6 && player.inventory.length >= num) {
        var it = player.inventory[num - 1];
        if (['weapon', 'armor', 'shield', 'ring', 'amulet'].indexOf(it.type) >= 0) {
          player.equip(it);
          if (showInventory) renderInventory();
        }
      }
    }
  });

  document.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; });

  canvas.addEventListener('mousemove', function(e) {
    setMouseFromClient(e.clientX, e.clientY);
  });
  canvas.addEventListener('mousedown', function(e) { mouse.down = true; e.preventDefault(); });
  canvas.addEventListener('mouseup', function() { mouse.down = false; });
  canvas.addEventListener('mouseleave', function() { mouse.down = false; });
  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length > 0) {
      primeAudio();
      setMouseFromClient(e.touches[0].clientX, e.touches[0].clientY);
      mouse.down = true;
    }
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) setMouseFromClient(e.touches[0].clientX, e.touches[0].clientY);
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', function(e) {
    if (e.touches.length === 0) mouse.down = false;
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  bindAudioUnlock();
  preventBrowserZoom();
  bindTouchControls();
  fitCanvas();
  window.addEventListener('resize', fitCanvas);
  window.addEventListener('orientationchange', function() { setTimeout(fitCanvas, 100); });


  // Class selection
  var classCards = document.querySelectorAll('.class-card');
  for (var ci = 0; ci < classCards.length; ci++) {
    (function(card) {
      card.addEventListener('click', function() {
        for (var j = 0; j < classCards.length; j++) classCards[j].classList.remove('selected');
        card.classList.add('selected');
        selectedClass = card.getAttribute('data-class');
        SFX.click();
      });
    })(classCards[ci]);
  }

  // Start button
  document.getElementById('btn-start').addEventListener('click', function() {
    primeAudio();
    SFX.click();
    setTimeout(function() { SFX.click(); }, 120);
    document.getElementById('game-title').style.display = 'none';
    gameState = 'playing';
    initLevel(1);
  });

  // Restart button
  document.getElementById('btn-restart').addEventListener('click', function() {
    location.reload();
  });

  // Sound toggle
  document.getElementById('sound-toggle').addEventListener('click', function() {
    primeAudio();
    soundEnabled = !soundEnabled;
    this.textContent = soundEnabled ? '🔊' : '🔇';
    if (soundEnabled) setTimeout(function() { SFX.click(); }, 50);
  });

  // ==================== GAME LOOP ====================
  function gameLoop(timestamp) {
    var dt = Math.min(0.05, (timestamp - lastTime) / 1000);
    lastTime = timestamp;
    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  requestAnimationFrame(function(timestamp) {
    lastTime = timestamp;
    gameLoop(timestamp);
  });
  </script>
  </body>
  </html>
